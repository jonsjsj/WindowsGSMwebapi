<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WGSM.WEB</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0d1117;
  --sb:       #161b22;
  --surface:  #21262d;
  --surface2: #2d333b;
  --border:   #30363d;
  --text:     #e6edf3;
  --muted:    #7d8590;
  --green:    #3fb950;
  --green-bg: #0d2218;
  --red:      #f85149;
  --red-bg:   #2d1215;
  --orange:   #d29922;
  --blue:     #58a6ff;
  --accent:   #1f6feb;
  --accent-h: #388bfd;
  --r:        8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
#sidebar{width:220px;min-width:220px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.sb-head{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sb-tag{font-size:10px;color:var(--muted);letter-spacing:.12em;font-family:'Courier New',monospace}
.sb-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:.03em;margin-top:2px}
.sb-section{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:16px 16px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;border-radius:0;color:var(--muted);font-size:13px;transition:background .1s,color .1s;user-select:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--surface);color:var(--text);border-left:2px solid var(--accent)}
.nav-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.sb-spacer{flex:1}

/* ── Instance list in sidebar ───────────────────────────────────────── */
.inst-section{border-top:1px solid var(--border);padding-bottom:8px}
.inst-item{padding:6px 16px;cursor:pointer;border-left:2px solid transparent;transition:.1s}
.inst-item:hover{background:var(--surface)}
.inst-item.active{background:var(--surface);border-left-color:var(--accent)}
.inst-row{display:flex;align-items:center;gap:8px}
.inst-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--muted)}
.inst-dot.online{background:var(--green)}
.inst-dot.offline{background:var(--red)}
.inst-name{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inst-count{font-size:10px;color:var(--muted)}
.inst-expand{font-size:10px;color:var(--muted);cursor:pointer;padding:0 4px;background:none;border:none;color:var(--muted)}
.inst-log{display:none;background:var(--bg);border-top:1px solid var(--border);padding:6px 10px;font-family:'Courier New',monospace;font-size:10px;color:var(--muted);max-height:100px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.inst-log.open{display:block}

/* ── Main area ───────────────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ──────────────────────────────────────────────────────────── */
#topbar{background:var(--sb);border-bottom:1px solid var(--border);padding:0 24px;height:48px;display:flex;align-items:center;gap:24px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:var(--text)}
.tb-spacer{flex:1}
.tb-stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.tb-stat-label{color:var(--muted);font-size:11px}
.tb-bar{width:50px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.tb-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.tb-bar-fill.cpu{background:var(--orange)}
.tb-bar-fill.ram{background:var(--blue)}
.tb-time{font-size:12px;color:var(--muted);font-family:'Courier New',monospace}

/* ── Content ─────────────────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;padding:24px}

/* ── Summary cards ───────────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.stat-value{font-size:28px;font-weight:700;line-height:1.1}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.blue{color:var(--blue)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Section header ──────────────────────────────────────────────────── */
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:3px;height:14px;background:var(--accent);border-radius:2px}
.btn-sm{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;transition:.15s}
.btn-sm:hover{border-color:var(--accent);color:var(--text)}

/* ── Server grid ─────────────────────────────────────────────────────── */
.server-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.server-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.server-card:hover{border-color:#484f58}
.card-game{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-weight:600;font-size:15px;color:var(--text)}
.card-inst{font-size:10px;color:var(--muted);margin-top:1px}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;display:inline-block}
.badge.started{background:var(--green-bg);color:var(--green);border:1px solid #1a4a28}.badge.started::before{background:var(--green)}
.badge.stopped{background:var(--red-bg);color:var(--red);border:1px solid #5a1e1e}.badge.stopped::before{background:var(--red)}
.badge.starting,.badge.restarting{background:#2a2a0d;color:var(--orange);border:1px solid #4a4a1a}.badge.starting::before,.badge.restarting::before{background:var(--orange)}
.badge.stopping{background:#2a1a0d;color:#e07b39;border:1px solid #4a3a1a}.badge.stopping::before{background:#e07b39}
.badge.unknown{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}.badge.unknown::before{background:var(--muted)}

/* ── Resource bars ───────────────────────────────────────────────────── */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.res-block{}
.res-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.res-value{font-size:16px;font-weight:700;margin-bottom:4px}
.res-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:2px;transition:width .6s}
.res-bar-fill.cpu{background:linear-gradient(90deg,var(--orange),#e8a838)}
.res-bar-fill.ram{background:linear-gradient(90deg,var(--blue),#79c0ff)}

/* ── Card meta ───────────────────────────────────────────────────────── */
.card-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.meta-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:'Courier New',monospace;font-size:10px}

/* ── Card actions ────────────────────────────────────────────────────── */
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-action{border:none;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;transition:filter .15s,opacity .15s;white-space:nowrap}
.btn-action:disabled{opacity:.35;cursor:not-allowed;filter:none}
.btn-start   {background:#0d2a0d;color:var(--green)}
.btn-stop    {background:#2d1215;color:var(--red)}
.btn-restart {background:#2a2a0d;color:var(--orange)}
.btn-logs    {background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-action:not(:disabled):hover{filter:brightness(1.3)}
.card-fb{font-size:11px;color:var(--muted);min-height:14px}

/* ── Logs modal ──────────────────────────────────────────────────────── */
#log-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
#log-modal.open{display:flex}
.log-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:min(900px,95vw);max-height:85vh;display:flex;flex-direction:column}
.log-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.log-title{font-size:14px;font-weight:600}
.log-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px}
.log-close:hover{color:var(--red)}
.log-body{flex:1;overflow-y:auto;padding:12px 16px;font-family:'Courier New',monospace;font-size:12px;color:#adbac7;line-height:1.5;white-space:pre-wrap;word-break:break-all;background:var(--bg)}
.log-toolbar{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ── Config modal ────────────────────────────────────────────────────── */
#cfg-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
#cfg-modal.open{display:flex}
.cfg-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:min(700px,95vw);max-height:85vh;display:flex;flex-direction:column}
.cfg-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cfg-body{flex:1;overflow-y:auto;padding:16px}
.cfg-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.cfg-field{margin-bottom:12px}
.cfg-field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cfg-field input,.cfg-field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-size:13px;outline:none;transition:border-color .15s}
.cfg-field input:focus,.cfg-field textarea:focus{border-color:var(--accent)}
.cfg-field textarea{font-family:'Courier New',monospace;font-size:11px;resize:vertical;min-height:200px}

/* ── Instances settings view ─────────────────────────────────────────── */
.inst-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.inst-card-info{flex:1}
.inst-card-name{font-weight:600;font-size:14px}
.inst-card-url{font-size:11px;color:var(--muted);font-family:'Courier New',monospace;margin-top:2px}
.inst-card-status{font-size:11px;margin-top:4px}

/* ── Add instance form ────────────────────────────────────────────────── */
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-top:16px}
.add-form h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.form-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-size:13px;outline:none;transition:border-color .15s}
.form-field input:focus{border-color:var(--accent)}
.form-full{grid-column:1/-1}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:500;transition:background .15s}
.btn-primary:hover{background:var(--accent-h)}
.btn-danger{background:#2d1215;color:var(--red);border:1px solid #5a1e1e;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.15s}
.btn-danger:hover{background:var(--red-bg);border-color:var(--red)}

/* ── Empty / loading ─────────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sb-head">
    <div class="sb-tag">// PANEL</div>
    <div class="sb-title">WGSM.WEB</div>
  </div>

  <div class="sb-section">Main</div>
  <button class="nav-item active" id="nav-dashboard" onclick="showView('dashboard')">
    <span class="nav-icon">▦</span> Dashboard
  </button>
  <button class="nav-item" id="nav-servers" onclick="showView('servers')">
    <span class="nav-icon">▤</span> Servers
  </button>
  <button class="nav-item" id="nav-logs" onclick="showView('logs')">
    <span class="nav-icon">≡</span> Logs
  </button>

  <div class="sb-section">System</div>
  <button class="nav-item" id="nav-instances" onclick="showView('instances')">
    <span class="nav-icon">⊞</span> Instances
  </button>
  <button class="nav-item" onclick="refreshAll()">
    <span class="nav-icon">↻</span> Refresh
  </button>

  <div class="sb-spacer"></div>

  <div class="inst-section" id="inst-sidebar"></div>
</aside>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<div id="main">
  <div id="topbar">
    <span class="tb-title" id="tb-title">Dashboard</span>
    <span class="tb-spacer"></span>
    <span class="tb-stat">
      <span class="tb-stat-label">CPU</span>
      <div class="tb-bar"><div class="tb-bar-fill cpu" id="tb-cpu-bar" style="width:0%"></div></div>
      <span id="tb-cpu-val">—</span>
    </span>
    <span class="tb-stat">
      <span class="tb-stat-label">RAM</span>
      <div class="tb-bar"><div class="tb-bar-fill ram" id="tb-ram-bar" style="width:0%"></div></div>
      <span id="tb-ram-val">—</span>
    </span>
    <span class="tb-time" id="tb-time"></span>
  </div>
  <div id="content"><div class="empty"><div class="spinner"></div>Loading…</div></div>
</div>

<!-- ── Log modal ───────────────────────────────────────────────────────── -->
<div id="log-modal" onclick="closeLogModal(event)">
  <div class="log-panel" onclick="event.stopPropagation()">
    <div class="log-header">
      <span class="log-title" id="log-modal-title">Server log</span>
      <button class="log-close" onclick="closeLogModal()">✕</button>
    </div>
    <div class="log-body" id="log-modal-body"></div>
    <div class="log-toolbar">
      <button class="btn-sm" onclick="refreshLogModal()">↻ Refresh</button>
      <button class="btn-sm" onclick="scrollLogToBottom()">↓ Bottom</button>
    </div>
  </div>
</div>

<!-- ── Config modal ────────────────────────────────────────────────────── -->
<div id="cfg-modal" onclick="closeCfgModal(event)">
  <div class="cfg-panel" onclick="event.stopPropagation()">
    <div class="cfg-header">
      <span class="log-title" id="cfg-modal-title">Server config</span>
      <button class="log-close" onclick="closeCfgModal()">✕</button>
    </div>
    <div class="cfg-body" id="cfg-modal-body"></div>
    <div class="cfg-footer">
      <button class="btn-sm" onclick="closeCfgModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const state = {
    view:       'dashboard',
    instances:  [],           // [{id,name,url,token}]
    instData:   {},           // {id: {info, servers, resources, status}}
    selInst:    null,         // selected instance id (null = all)
    logCtx:     null,         // {instanceId, serverId, serverName}
    refreshId:  null,
};

// ── Boot ──────────────────────────────────────────────────────────────────
(async function boot() {
    tickClock();
    setInterval(tickClock, 1000);
    await loadInstances();
    await refreshAll();
    state.refreshId = setInterval(refreshAll, 15_000);
    renderView();
})();

// ── Clock ─────────────────────────────────────────────────────────────────
function tickClock() {
    document.getElementById('tb-time').textContent =
        new Date().toLocaleTimeString('en-GB', { hour12: false });
}

// ── Data loading ──────────────────────────────────────────────────────────
async function loadInstances() {
    try {
        const r = await fetch('/api/instances');
        state.instances = await r.json();
    } catch { state.instances = []; }
}

async function refreshAll() {
    await Promise.allSettled(state.instances.map(fetchInstance));
    updateTopbarStats();
    renderSidebar();
    if (['dashboard','servers','logs'].includes(state.view)) renderView();
}

async function fetchInstance(inst) {
    const d = state.instData[inst.id] ??= { status: 'unknown', info: null, servers: [], resources: null };

    // Ping (public, no auth)
    try {
        const r = await fetch(`/api/ping/${inst.id}`);
        const j = await r.json();
        d.status = j.online ? 'online' : 'offline';
        if (j.online) d.info = j;
    } catch { d.status = 'offline'; }

    if (d.status !== 'online') { d.servers = []; d.resources = null; return; }

    // Servers + resources in parallel
    const [sv, rs] = await Promise.allSettled([
        proxyGet(inst.id, 'api/servers'),
        proxyGet(inst.id, 'api/resources/summary'),
    ]);
    d.servers   = sv.status === 'fulfilled' ? (sv.value ?? []) : [];
    d.resources = rs.status === 'fulfilled' ? rs.value : null;
}

async function proxyGet(instanceId, path) {
    const r = await fetch(`/api/proxy/${instanceId}/${path}`);
    if (!r.ok) return null;
    return r.json();
}

async function proxyPost(instanceId, path, body) {
    const r = await fetch(`/api/proxy/${instanceId}/${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
    });
    return { ok: r.ok, status: r.status, data: await r.json().catch(() => null) };
}

// ── Topbar stats ──────────────────────────────────────────────────────────
function updateTopbarStats() {
    let totCpu = 0, totRam = 0, count = 0;
    for (const inst of state.instances) {
        const d = state.instData[inst.id];
        if (d?.resources) {
            totCpu += d.resources.totalCpuPercent ?? 0;
            totRam += d.resources.totalRamMb ?? 0;
            count++;
        }
    }
    const cpuPct = count ? Math.min(100, totCpu / count) : 0;
    document.getElementById('tb-cpu-bar').style.width = cpuPct + '%';
    document.getElementById('tb-cpu-val').textContent  = count ? totCpu.toFixed(1) + '%' : '—';
    const ramGb = totRam / 1024;
    document.getElementById('tb-ram-bar').style.width = Math.min(100, ramGb / 32 * 100) + '%';
    document.getElementById('tb-ram-val').textContent  = count ? ramGb.toFixed(1) + ' GB' : '—';
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function renderSidebar() {
    const el = document.getElementById('inst-sidebar');
    if (!state.instances.length) { el.innerHTML = ''; return; }

    el.innerHTML = `<div class="sb-section">Instances</div>` +
        state.instances.map(inst => {
            const d      = state.instData[inst.id] ?? {};
            const status = d.status ?? 'unknown';
            const online = d.servers?.filter(s => s.status === 'Started').length ?? 0;
            const total  = d.servers?.length ?? 0;
            const sel    = state.selInst === inst.id ? 'active' : '';
            return `
<div class="inst-item ${sel}" id="isb-${inst.id}">
  <div class="inst-row" onclick="selectInstance('${inst.id}')">
    <span class="inst-dot ${status === 'online' ? 'online' : 'offline'}"></span>
    <span class="inst-name" title="${esc(inst.name)}">${esc(inst.name)}</span>
    <span class="inst-count">${online}/${total}</span>
    <button class="inst-expand" onclick="toggleInstLog(event,'${inst.id}')">▾</button>
  </div>
  <div class="inst-log" id="ilog-${inst.id}">${getInstLogHtml(inst.id)}</div>
</div>`;
        }).join('');
}

function getInstLogHtml(id) {
    const d = state.instData[id];
    if (!d || d.status !== 'online') return '<span style="color:var(--red)">Offline</span>';
    const s = d.servers?.slice(0,5).map(s =>
        `[${s.status === 'Started' ? '▶' : '■'}] ${esc(s.name)}`).join('\n') ?? '';
    return s || '(no servers)';
}

function toggleInstLog(e, id) {
    e.stopPropagation();
    document.getElementById(`ilog-${id}`)?.classList.toggle('open');
}

function selectInstance(id) {
    state.selInst = state.selInst === id ? null : id;
    renderSidebar();
    renderView();
}

// ── Views ─────────────────────────────────────────────────────────────────
function showView(v) {
    state.view = v;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + v)?.classList.add('active');
    document.getElementById('tb-title').textContent = v.charAt(0).toUpperCase() + v.slice(1);
    renderView();
}

function renderView() {
    const el = document.getElementById('content');
    switch (state.view) {
        case 'dashboard': el.innerHTML = renderDashboard(); break;
        case 'servers':   el.innerHTML = renderServers();   break;
        case 'logs':      el.innerHTML = renderLogsView();  break;
        case 'instances': el.innerHTML = renderInstances(); break;
        default:          el.innerHTML = '';
    }
    bindCardButtons();
}

// ── Dashboard ─────────────────────────────────────────────────────────────
function renderDashboard() {
    const insts = filteredInstances();
    let total = 0, online = 0, offline = 0, cpuSum = 0, cpuCount = 0;
    const cards = [];

    for (const inst of insts) {
        const d = state.instData[inst.id] ?? {};
        total   += d.servers?.length ?? 0;
        online  += d.servers?.filter(s => s.status === 'Started').length ?? 0;
        offline += d.servers?.filter(s => s.status === 'Stopped').length ?? 0;
        if (d.resources?.totalCpuPercent != null) { cpuSum += d.resources.totalCpuPercent; cpuCount++; }
        (d.servers ?? []).forEach(s => cards.push({ inst, server: s, d }));
    }

    const cpuAvg  = cpuCount ? (cpuSum / cpuCount).toFixed(1) : '—';
    const preview = cards.slice(0, 6);

    return `
<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-label">Total Servers</div>
    <div class="stat-value">${total}</div>
    <div class="stat-sub">Installed</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Online</div>
    <div class="stat-value green">${online}</div>
    <div class="stat-sub">Running now</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Offline</div>
    <div class="stat-value red">${offline}</div>
    <div class="stat-sub">Stopped</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Aggregate CPU</div>
    <div class="stat-value blue">${cpuAvg}${cpuCount ? '%' : ''}</div>
    <div class="stat-sub">All instances</div>
  </div>
</div>
<div class="section-row">
  <span class="section-title">Server overview</span>
  <button class="btn-sm" onclick="showView('servers')">View all →</button>
</div>
<div class="server-grid">
  ${preview.length ? preview.map(({inst,server,d}) => serverCard(inst, server, d)).join('') : '<div class="empty">No servers found.</div>'}
</div>`;
}

// ── Servers ───────────────────────────────────────────────────────────────
function renderServers() {
    const insts = filteredInstances();
    const cards = [];
    for (const inst of insts)
        (state.instData[inst.id]?.servers ?? []).forEach(s =>
            cards.push({ inst, server: s, d: state.instData[inst.id] }));

    return `
<div class="section-row">
  <span class="section-title">All servers (${cards.length})</span>
  <button class="btn-sm" onclick="refreshAll()">↻ Refresh</button>
</div>
<div class="server-grid">
  ${cards.length ? cards.map(({inst,server,d}) => serverCard(inst, server, d)).join('') : '<div class="empty">No servers found.</div>'}
</div>`;
}

// ── Logs view ─────────────────────────────────────────────────────────────
function renderLogsView() {
    const insts = filteredInstances();
    const rows  = [];
    for (const inst of insts)
        (state.instData[inst.id]?.servers ?? []).forEach(s =>
            rows.push(`<div class="inst-card">
  <div class="inst-card-info">
    <div class="inst-card-name">${esc(s.name)}</div>
    <div class="inst-card-url">${esc(inst.name)} · ${esc(s.game)}</div>
  </div>
  <span class="badge ${statusClass(s.status)}">${esc(s.status)}</span>
  <button class="btn-sm" onclick="openLogModal('${inst.id}','${s.id}','${esc(s.name)}')">View logs</button>
</div>`));
    return `
<div class="section-row"><span class="section-title">Server logs</span></div>
${rows.length ? rows.join('') : '<div class="empty">No servers found.</div>'}`;
}

// ── Instances settings ────────────────────────────────────────────────────
function renderInstances() {
    const cards = state.instances.map(inst => {
        const d      = state.instData[inst.id] ?? {};
        const status = d.status ?? 'unknown';
        const color  = status === 'online' ? 'var(--green)' : status === 'offline' ? 'var(--red)' : 'var(--muted)';
        const info   = d.info ? ` · ${d.info.instanceName} · ${d.info.onlineServers}/${d.info.totalServers} online` : '';
        return `<div class="inst-card">
  <span class="inst-dot ${status}" style="width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block;background:${color}"></span>
  <div class="inst-card-info">
    <div class="inst-card-name">${esc(inst.name)}</div>
    <div class="inst-card-url">${esc(inst.url)}</div>
    <div class="inst-card-status" style="color:${color}">${status}${info}</div>
  </div>
  <button class="btn-sm" onclick="pingInstance('${inst.id}')">Ping</button>
  <button class="btn-danger" onclick="removeInstance('${inst.id}')">Remove</button>
</div>`;
    }).join('');

    return `
<div class="section-row"><span class="section-title">WGSM instances (${state.instances.length})</span></div>
${cards || '<div class="empty" style="padding:20px">No instances added yet.</div>'}
<div class="add-form">
  <h3>Add instance</h3>
  <div class="form-grid">
    <div class="form-field"><label>Name</label><input id="af-name" placeholder="Gaming Rig #1"/></div>
    <div class="form-field"><label>URL (with port)</label><input id="af-url" placeholder="http://192.168.1.100:7876"/></div>
    <div class="form-field form-full"><label>API Token</label><input id="af-token" placeholder="Paste token from WGSM Web API settings"/></div>
  </div>
  <div style="margin-top:12px">
    <button class="btn-primary" onclick="addInstance()">Add instance</button>
  </div>
</div>`;
}

// ── Server card ───────────────────────────────────────────────────────────
function serverCard(inst, s, d) {
    const running  = s.status === 'Started';
    const starting = ['Starting','Restarting'].includes(s.status);
    const stopping = s.status === 'Stopping';
    const stopped  = s.status === 'Stopped';
    const busy     = starting || stopping;

    const totalRam  = d.resources?.totalRamMb ?? 0;
    const cpuPct    = s.cpuPercent != null ? s.cpuPercent.toFixed(1) : null;
    const cpuBar    = cpuPct != null ? Math.min(100, parseFloat(cpuPct)) : 0;
    const ramMb     = s.ramMb != null ? s.ramMb.toFixed(0) : null;
    const ramBar    = (ramMb && totalRam) ? Math.min(100, (parseFloat(ramMb) / totalRam) * 100) : 0;

    const players   = s.playersCurrent != null
        ? `<span class="meta-chip">👥 ${s.playersCurrent}/${s.playersMax ?? '?'}</span>` : '';
    const port      = s.serverPort ? `<span class="meta-chip">:${esc(s.serverPort)}</span>` : '';
    const queryPort = (s.queryPort && s.queryPort !== s.serverPort)
        ? `<span class="meta-chip">Q:${esc(s.queryPort)}</span>` : '';
    const multiInst = state.instances.length > 1
        ? `<div class="card-inst">${esc(inst.name)}</div>` : '';

    return `<div class="server-card" id="card-${inst.id}-${s.id}">
  <div class="card-game">${esc(s.game)}</div>
  <div class="card-header">
    <div>
      <div class="card-name">${esc(s.name)}</div>
      ${multiInst}
    </div>
    <span class="badge ${statusClass(s.status)}">${esc(s.status)}</span>
  </div>
  ${running ? `<div class="res-grid">
    <div class="res-block">
      <div class="res-label">CPU</div>
      <div class="res-value">${cpuPct != null ? cpuPct + '%' : '—'}</div>
      <div class="res-bar"><div class="res-bar-fill cpu" style="width:${cpuBar}%"></div></div>
    </div>
    <div class="res-block">
      <div class="res-label">RAM</div>
      <div class="res-value">${ramMb != null ? fmtMb(parseFloat(ramMb)) : '—'}</div>
      <div class="res-bar"><div class="res-bar-fill ram" style="width:${ramBar}%"></div></div>
    </div>
  </div>` : ''}
  <div class="card-meta">${port}${queryPort}${players}</div>
  <div class="card-actions">
    <button class="btn-action btn-start"   data-inst="${inst.id}" data-id="${s.id}" data-cmd="start"
      ${running||starting ? 'disabled' : ''}>▶ Start</button>
    <button class="btn-action btn-restart" data-inst="${inst.id}" data-id="${s.id}" data-cmd="restart"
      ${stopped||busy ? 'disabled' : ''}>↺ Restart</button>
    <button class="btn-action btn-stop"    data-inst="${inst.id}" data-id="${s.id}" data-cmd="stop"
      ${stopped||stopping ? 'disabled' : ''}>■ Stop</button>
    <button class="btn-action btn-logs"    onclick="openLogModal('${inst.id}','${s.id}','${esc(s.name)}')">≡ Logs</button>
  </div>
  <div class="card-fb" id="fb-${inst.id}-${s.id}"></div>
</div>`;
}

function bindCardButtons() {
    document.querySelectorAll('[data-cmd]').forEach(btn => {
        btn.addEventListener('click', async () => {
            const { inst, id, cmd } = btn.dataset;
            await serverAction(inst, id, cmd);
        });
    });
}

async function serverAction(instanceId, serverId, cmd) {
    const fb = document.getElementById(`fb-${instanceId}-${serverId}`);
    const card = document.getElementById(`card-${instanceId}-${serverId}`);
    card?.querySelectorAll('[data-cmd]').forEach(b => b.disabled = true);
    if (fb) fb.textContent = `Sending ${cmd}…`;

    const { ok, data } = await proxyPost(instanceId, `api/servers/${serverId}/${cmd}`);
    if (fb) fb.textContent = data?.message ?? (ok ? 'Done.' : 'Failed.');

    setTimeout(async () => {
        await fetchInstance(state.instances.find(i => i.id === instanceId));
        renderView();
    }, 1500);
}

// ── Log modal ─────────────────────────────────────────────────────────────
function openLogModal(instanceId, serverId, serverName) {
    state.logCtx = { instanceId, serverId, serverName };
    document.getElementById('log-modal-title').textContent = `Logs — ${serverName}`;
    document.getElementById('log-modal').classList.add('open');
    loadLogs();
}
function closeLogModal(e) {
    if (e && e.target !== document.getElementById('log-modal')) return;
    document.getElementById('log-modal').classList.remove('open');
    state.logCtx = null;
}
async function loadLogs() {
    if (!state.logCtx) return;
    const { instanceId, serverId } = state.logCtx;
    const body = document.getElementById('log-modal-body');
    body.textContent = 'Loading…';
    const data = await proxyGet(instanceId, `api/servers/${serverId}/logs?count=500`);
    body.textContent = Array.isArray(data) && data.length
        ? data.join('\n')
        : '(no log output available)';
    scrollLogToBottom();
}
function refreshLogModal() { loadLogs(); }
function scrollLogToBottom() {
    const b = document.getElementById('log-modal-body');
    b.scrollTop = b.scrollHeight;
}

// ── Config modal (placeholder) ────────────────────────────────────────────
function closeCfgModal(e) {
    if (e && e.target !== document.getElementById('cfg-modal')) return;
    document.getElementById('cfg-modal').classList.remove('open');
}

// ── Instances management ──────────────────────────────────────────────────
async function addInstance() {
    const name  = document.getElementById('af-name')?.value?.trim();
    const url   = document.getElementById('af-url')?.value?.trim();
    const token = document.getElementById('af-token')?.value?.trim();
    if (!name || !url || !token) { alert('All fields required.'); return; }

    await fetch('/api/instances', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, url, token }),
    });
    await loadInstances();
    await refreshAll();
    renderView();
}

async function removeInstance(id) {
    if (!confirm('Remove this instance?')) return;
    await fetch(`/api/instances/${id}`, { method: 'DELETE' });
    if (state.selInst === id) state.selInst = null;
    await loadInstances();
    await refreshAll();
    renderView();
}

async function pingInstance(id) {
    const r = await fetch(`/api/ping/${id}`);
    const d = await r.json();
    alert(d.online
        ? `✓ Online — ${d.instanceName ?? ''} (${d.onlineServers}/${d.totalServers} servers running)`
        : '✗ Offline or unreachable');
}

// ── Helpers ───────────────────────────────────────────────────────────────
function filteredInstances() {
    return state.selInst
        ? state.instances.filter(i => i.id === state.selInst)
        : state.instances;
}

function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function statusClass(s) {
    const m = { Started:'started', Stopped:'stopped', Starting:'starting', Stopping:'stopping', Restarting:'restarting' };
    return m[s] ?? 'unknown';
}

function fmtMb(mb) {
    return mb >= 1024 ? (mb / 1024).toFixed(1) + ' GB' : mb.toFixed(0) + ' MB';
}
</script>
</body>
</html>
