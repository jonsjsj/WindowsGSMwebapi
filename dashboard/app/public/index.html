<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WGSM.WEB</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0d0d0d;
  --sb:       #111111;
  --surface:  #111111;
  --surface2: #1a1a1a;
  --border:   #222222;
  --text:     #e0e0e0;
  --muted:    #888888;
  --green:    #00d4aa;
  --green-bg: #0d2a1f;
  --red:      #ff4d4d;
  --red-bg:   #2d1215;
  --orange:   #ff9f43;
  --orange-bg:#2a1e0d;
  --accent:   #00d4aa;
  --r:        8px;
}
html{height:100%;overflow:hidden}body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;display:flex;height:100%;overflow:hidden}

/* ── Sidebar ───────────────────────────────────────────────────────────── */
#sidebar{width:210px;min-width:140px;flex-shrink:1;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}@media(max-width:540px){#sidebar{display:none}}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-text{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:1px}
.logo-sub{font-size:10px;color:#444;margin-top:2px;letter-spacing:.3px}
.sb-section{font-size:10px;color:#444;letter-spacing:.08em;text-transform:uppercase;padding:14px 16px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;color:var(--muted);font-size:12px;transition:background .1s,color .1s;user-select:none;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent}
.nav-item:hover{background:var(--surface2);color:#ccc}
.nav-item.active{background:var(--surface2);color:var(--text);border-left-color:var(--accent)}
.nav-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.nav-badge.teal{background:#00d4aa22;color:var(--accent)}
.nav-badge.red{background:#ff4d4d22;color:var(--red)}
.sb-bottom{margin-top:auto;border-top:1px solid var(--border);padding:6px 0}

/* ── Instance list ─────────────────────────────────────────────────────── */
.inst-section{border-top:1px solid var(--border);padding-bottom:8px}
.inst-item{padding:5px 14px;cursor:pointer;border-left:2px solid transparent;transition:.1s}
.inst-item:hover{background:var(--surface2)}
.inst-item.active{background:var(--surface2);border-left-color:var(--accent)}
.inst-row{display:flex;align-items:center;gap:8px}
.inst-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--muted)}
.inst-dot.online{background:var(--green)}
.inst-dot.offline{background:var(--red)}
.inst-name{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inst-count{font-size:10px;color:var(--muted)}
.inst-expand{font-size:10px;color:var(--muted);cursor:pointer;padding:0 4px;background:none;border:none}
.inst-log{display:none;background:var(--bg);border-top:1px solid var(--border);padding:6px 10px;font-family:'Courier New',monospace;font-size:10px;color:var(--muted);max-height:100px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.inst-log.open{display:block}

/* ── Main area ─────────────────────────────────────────────────────────── */
#main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── Topbar ────────────────────────────────────────────────────────────── */
#topbar{background:var(--sb);border-bottom:1px solid var(--border);padding:0 12px;min-height:38px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;overflow:hidden}
.tb-title{font-size:13px;font-weight:600;color:var(--text)}
.tb-spacer{flex:1}
.tb-sep{width:1px;height:16px;background:var(--border)}
.tb-stat{display:flex;align-items:center;gap:6px;font-size:11px}
.tb-label{color:#444;font-size:10px}
.tb-bar{width:50px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.tb-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.tb-bar-fill.cpu{background:var(--orange)}
.tb-bar-fill.ram{background:var(--accent)}
.tb-val{color:var(--muted);min-width:30px;font-size:11px}
.tb-time{font-size:11px;color:#444;font-variant-numeric:tabular-nums}
.upd-badge{background:var(--orange-bg);border:1px solid var(--orange);color:var(--orange);border-radius:4px;padding:2px 8px;font-size:10px;font-weight:600;cursor:pointer}
.upd-badge:hover{filter:brightness(1.2)}

/* ── Content ───────────────────────────────────────────────────────────── */
#content{flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;padding:16px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

/* ── Stats grid ────────────────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:550px){.stat-grid{grid-template-columns:1fr 1fr}#sidebar{width:0;overflow:hidden}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:700;line-height:1.1;color:var(--text)}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-value.accent{color:var(--accent)}
.stat-sub{font-size:10px;color:#444;margin-top:3px}

/* ── Section header ────────────────────────────────────────────────────── */
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:600;color:#ccc;border-left:2px solid var(--accent);padding-left:8px}
.btn-sm{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:11px;transition:.15s;font-family:inherit}
.btn-sm:hover{border-color:var(--accent);color:var(--text)}

/* ── Server grid ───────────────────────────────────────────────────────── */
.server-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.server-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.server-card:hover{border-color:#333}

/* card header row */
.card-header{display:flex;align-items:center;gap:8px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-orange{background:var(--orange)}
.dot-grey{background:#444}
.card-name{font-weight:600;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}

/* badge */
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.badge.started{background:var(--green-bg);color:var(--green)}
.badge.stopped{background:var(--red-bg);color:var(--red)}
.badge.starting,.badge.restarting{background:var(--orange-bg);color:var(--orange)}
.badge.stopping{background:#2a1a0d;color:#e07b39}
.badge.unknown{background:var(--surface2);color:var(--muted)}

/* game label */
.card-game{font-size:11px;color:#444}

/* resource bars */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.res-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.res-value{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text)}
.res-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:2px;transition:width .6s}
.res-bar-fill.cpu{background:var(--orange)}
.res-bar-fill.ram{background:var(--accent)}

/* meta / ports */
.card-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.meta-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:'Courier New',monospace;font-size:10px}
.port-chip{background:var(--surface2);border-radius:4px;padding:2px 6px;font-family:'Courier New',monospace;font-size:10px;display:inline-flex;align-items:center;gap:4px}
.port-dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.port-dot.ok{background:var(--green)}.port-dot.fail{background:var(--red)}.port-dot.unknown{background:var(--muted)}

/* actions */
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-action{border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;transition:filter .15s;white-space:nowrap;font-family:inherit}
.btn-action:disabled{opacity:.35;cursor:not-allowed;filter:none}
.btn-start   {background:var(--green-bg);color:var(--green)}
.btn-stop    {background:var(--red-bg);color:var(--red)}
.btn-restart {background:var(--orange-bg);color:var(--orange)}
.btn-logs    {background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-action:not(:disabled):hover{filter:brightness(1.3)}
.card-fb{font-size:11px;color:var(--muted);min-height:14px}
.card-inst{font-size:10px;color:#444;margin-top:1px}

/* ── Log modal ─────────────────────────────────────────────────────────── */
#log-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100}
#log-modal.open{display:flex}
.log-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:min(900px,95vw);max-height:85vh;display:flex;flex-direction:column}
.log-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.log-title{font-size:13px;font-weight:600;color:var(--text)}
.log-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px}
.log-close:hover{color:var(--red)}
.log-body{flex:1;overflow-y:auto;padding:12px 16px;font-family:'Courier New',monospace;font-size:12px;color:#aaa;line-height:1.5;white-space:pre-wrap;word-break:break-all;background:var(--bg)}
.log-toolbar{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ── Config modal ──────────────────────────────────────────────────────── */
#cfg-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100}
#cfg-modal.open{display:flex}
.cfg-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:min(700px,95vw);max-height:85vh;display:flex;flex-direction:column}
.cfg-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cfg-body{flex:1;overflow-y:auto;padding:16px}
.cfg-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.cfg-field{margin-bottom:12px}
.cfg-field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cfg-field input,.cfg-field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-size:12px;outline:none;transition:border-color .15s;font-family:inherit}
.cfg-field input:focus,.cfg-field textarea:focus{border-color:var(--accent)}
.cfg-field textarea{font-family:'Courier New',monospace;font-size:11px;resize:vertical;min-height:200px}

/* ── Instances view ────────────────────────────────────────────────────── */
.inst-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.inst-card-info{flex:1}
.inst-card-name{font-weight:600;font-size:13px;color:var(--text)}
.inst-card-url{font-size:11px;color:var(--muted);font-family:'Courier New',monospace;margin-top:2px}
.inst-card-status{font-size:11px;margin-top:3px}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-top:16px}
.add-form-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.form-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-size:12px;outline:none;transition:border-color .15s;font-family:inherit}
.form-field input:focus{border-color:var(--accent)}
.form-full{grid-column:1/-1}
.btn-primary{background:var(--accent);color:#000;border:none;border-radius:6px;padding:7px 18px;font-size:12px;cursor:pointer;font-weight:600;transition:filter .15s;font-family:inherit}
.btn-primary:hover{filter:brightness(.9)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #5a1e1e;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;transition:.15s;font-family:inherit}
.btn-danger:hover{filter:brightness(1.2)}

/* ── Backup view ───────────────────────────────────────────────────────── */
.backup-inst-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.backup-inst-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.backup-inst-name{font-weight:600;font-size:13px;color:var(--text)}
.backup-list{margin-top:8px;font-size:11px;color:var(--muted);font-family:'Courier New',monospace}
.backup-item{padding:3px 0;border-bottom:1px solid var(--border)}

/* ── Plugin cards ──────────────────────────────────────────────────────── */
.plugin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.plugin-info{flex:1}
.plugin-name{font-weight:600;font-size:13px;color:var(--text)}
.plugin-desc{font-size:11px;color:var(--muted);margin-top:2px}
.plugin-repo{font-size:10px;color:#444;margin-top:2px;font-family:'Courier New',monospace}

/* ── Empty / loading ───────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.hint{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:10px;border:1px solid}
.hint-orange{background:var(--orange-bg);border-color:#4a3515;color:var(--orange)}
.hint-muted{background:var(--surface);border-color:var(--border);color:var(--muted)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── File editor modal ─────────────────────────────────────────────────── */
#file-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:110}
#file-modal.open{display:flex}
.file-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:min(900px,97vw);height:min(85vh,700px);display:flex;flex-direction:column}
.file-toolbar{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.file-breadcrumb{font-size:11px;color:var(--muted);font-family:'Courier New',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-body{flex:1;display:flex;overflow:hidden}
.file-tree{width:220px;border-right:1px solid var(--border);overflow-y:auto;padding:6px 0;flex-shrink:0}
.file-entry{display:flex;align-items:center;gap:6px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text);transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-entry:hover{background:var(--surface2)}
.file-entry.selected{background:var(--surface2);color:var(--accent)}
.file-entry-icon{font-size:10px;flex-shrink:0;color:var(--muted)}
.file-editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.file-editor-pane textarea{flex:1;width:100%;border:none;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:12px;padding:12px;outline:none;resize:none;line-height:1.6;tab-size:4;box-sizing:border-box}
.file-status{padding:5px 12px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);min-height:24px}
.file-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;justify-content:flex-end}
.tpl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.tpl-info{flex:1}.tpl-name{font-weight:600;font-size:13px;color:var(--text)}.tpl-meta{font-size:11px;color:var(--muted);margin-top:2px}
.tpl-actions{display:flex;gap:6px;flex-wrap:wrap}
.mig-step{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.mig-step-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.mig-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.mig-row{grid-template-columns:1fr}}
.mig-field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mig-field select,.mig-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-size:12px;outline:none;font-family:inherit}
.mig-log{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-family:'Courier New',monospace;font-size:11px;line-height:1.6;max-height:180px;overflow-y:auto;color:var(--muted);margin-top:10px;white-space:pre-wrap;display:none}
.mig-log.visible{display:block}
.cl-entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:12px}
.cl-version{font-weight:700;font-size:14px;color:var(--accent)}.cl-date{font-size:11px;color:var(--muted);margin-left:10px}
.cl-title{font-size:13px;font-weight:600;color:var(--text);margin:6px 0 8px}.cl-list{padding-left:18px;margin:0}
.cl-list li{font-size:12px;color:var(--muted);line-height:1.7}.cl-list li strong{color:var(--text)}
.cl-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;margin-right:4px;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.cl-tag.new{background:#0d2b1a;color:var(--green);border-color:#1a4a2a}
.cl-tag.fix{background:#2a1b0d;color:var(--orange);border-color:#4a3010}
.cl-tag.imp{background:#0d1a2b;color:var(--accent);border-color:#1a304a}
</style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sb-head">
    <div class="logo-text">WGSM</div>
    <div class="logo-sub">Game Server Manager</div>
  </div>

  <div class="sb-section">Manage</div>
  <button class="nav-item active" id="nav-dashboard" onclick="showView('dashboard')">
    <span class="nav-icon">▦</span> Dashboard
  </button>
  <button class="nav-item" id="nav-servers" onclick="showView('servers')">
    <span class="nav-icon">▤</span> Servers
    <span class="nav-badge teal" id="nav-servers-badge" style="display:none">0</span>
  </button>
  <button class="nav-item" id="nav-plugins" onclick="showView('plugins')">
    <span class="nav-icon">⊞</span> Plugins
  </button>
  <button class="nav-item" id="nav-install" onclick="showView('install')">
    <span class="nav-icon">⊕</span> Install Server
  </button>
  <button class="nav-item" id="nav-templates" onclick="showView('templates')">
    <span class="nav-icon">⊛</span> Config Templates
  </button>
  <button class="nav-item" id="nav-migrate" onclick="showView('migrate')">
    <span class="nav-icon">⇄</span> Migration
  </button>

  <div class="sb-section">System</div>
  <button class="nav-item" id="nav-instances" onclick="showView('instances')">
    <span class="nav-icon">⊕</span> Instances
  </button>
  <button class="nav-item" id="nav-logs" onclick="showView('logs')">
    <span class="nav-icon">≡</span> Logs
  </button>
  <button class="nav-item" id="nav-backup" onclick="showView('backup')">
    <span class="nav-icon">⊟</span> Backup &amp; Update
  </button>
  <button class="nav-item" id="nav-changelog" onclick="showView('changelog')">
    <span class="nav-icon">✦</span> Changelog
  </button>

  <div class="sb-bottom">
    <button class="nav-item" onclick="refreshAll()" style="color:#444">
      <span class="nav-icon">↻</span> Refresh
    </button>
    <button class="nav-item" onclick="selfUpdate(this)" title="Pull latest dashboard from GitHub" style="color:#444">
      <span class="nav-icon">⬆</span> Update dashboard
    </button>
  </div>

  <div class="inst-section" id="inst-sidebar"></div>
</aside>

<!-- ── Main ─────────────────────────────────────────────────────────────── -->
<div id="main">
  <div id="topbar">
    <span class="tb-title" id="tb-title">Dashboard</span>
    <span class="tb-spacer"></span>
    <span class="tb-stat">
      <span class="tb-label">CPU</span>
      <div class="tb-bar"><div class="tb-bar-fill cpu" id="tb-cpu-bar" style="width:0%"></div></div>
      <span class="tb-val" id="tb-cpu-val">—</span>
    </span>
    <div class="tb-sep"></div>
    <span class="tb-stat">
      <span class="tb-label">RAM</span>
      <div class="tb-bar"><div class="tb-bar-fill ram" id="tb-ram-bar" style="width:0%"></div></div>
      <span class="tb-val" id="tb-ram-val">—</span>
    </span>
    <div class="tb-sep"></div>
    <span id="tb-update-badge" style="display:none" class="upd-badge" onclick="showView('backup')" title="Click to view instances with updates">⬆ Update available</span>
    <span class="tb-time" id="tb-time"></span>
  </div>
  <div id="content"><div class="empty"><div class="spinner"></div>Loading…</div></div>
</div>

<!-- ── Log modal ────────────────────────────────────────────────────────── -->
<div id="log-modal" onclick="closeLogModal(event)">
  <div class="log-panel" onclick="event.stopPropagation()">
    <div class="log-header">
      <span class="log-title" id="log-modal-title">Server log</span>
      <button class="log-close" onclick="closeLogModal()">✕</button>
    </div>
    <div class="log-body" id="log-modal-body"></div>
    <div class="log-toolbar">
      <button class="btn-sm" onclick="refreshLogModal()">↻ Refresh</button>
      <button class="btn-sm" onclick="scrollLogToBottom()">↓ Bottom</button>
    </div>
  </div>
</div>

<!-- ── Config modal ──────────────────────────────────────────────────────── -->
<div id="cfg-modal" onclick="closeCfgModal(event)">
  <div class="cfg-panel" onclick="event.stopPropagation()">
    <div class="cfg-header">
      <span class="log-title" id="cfg-modal-title">Server config</span>
      <button class="log-close" onclick="closeCfgModal()">✕</button>
    </div>
    <div class="cfg-body" id="cfg-modal-body"></div>
    <div class="cfg-footer">
      <button class="btn-sm" onclick="closeCfgModal()">Cancel</button>
    </div>
  </div>
</div>


<!-- ── File editor modal ────────────────────────────────────────────────── -->
<div id="file-modal" onclick="closeFileModal(event)">
  <div class="file-panel" onclick="event.stopPropagation()">
    <div class="file-toolbar">
      <span class="log-title" id="file-modal-title" style="font-size:13px;font-weight:600">Files</span>
      <span class="file-breadcrumb" id="file-breadcrumb">/</span>
      <button class="btn-sm" id="file-save-btn" onclick="saveCurrentFile()" style="display:none">⊟ Save</button>
      <button class="btn-sm" id="file-download-btn" onclick="downloadCurrentFile()" style="display:none">⬇ Download</button>
      <button class="log-close" onclick="closeFileModal()">✕</button>
    </div>
    <div class="file-body">
      <div class="file-tree" id="file-tree">
        <div class="empty" style="padding:20px 10px;font-size:11px">Loading…</div>
      </div>
      <div class="file-editor-pane">
        <textarea id="file-editor" placeholder="Select a file to edit…" spellcheck="false"></textarea>
        <div class="file-status" id="file-status"></div>
      </div>
    </div>
    <div class="file-footer">
      <button class="btn-sm" onclick="navigateFileUp()">⬆ Up</button>
      <span style="flex:1"></span>
      <button class="btn-sm" onclick="closeFileModal()">Close</button>
    </div>
  </div>
</div>
<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
    view:       'dashboard',
    instances:  [],
    instData:   {},
    updateData: {},
    selInst:    null,
    logCtx:     null,
    refreshId:  null,
};

// ── Boot ───────────────────────────────────────────────────────────────────
(async function boot() {
    tickClock();
    setInterval(tickClock, 1000);
    await loadInstances();
    await refreshAll();
    state.refreshId = setInterval(refreshAll, 15_000);
    renderView();
})();

// ── Clock ──────────────────────────────────────────────────────────────────
function tickClock() {
    document.getElementById('tb-time').textContent =
        new Date().toLocaleTimeString('en-GB', { hour12: false });
}

// ── Data loading ───────────────────────────────────────────────────────────
async function loadInstances() {
    try {
        const r = await fetch('/api/instances');
        state.instances = await r.json();
    } catch { state.instances = []; }
}

async function refreshAll() {
    await Promise.allSettled(state.instances.map(fetchInstance));
    updateTopbarStats();
    renderSidebar();
    if (['dashboard','servers','logs'].includes(state.view)) renderView();
}

async function fetchInstance(inst) {
    const d = state.instData[inst.id] ??= { status: 'unknown', info: null, servers: [], resources: null };

    try {
        const r = await fetch(`/api/ping/${inst.id}`);
        const j = await r.json();
        d.status = j.online ? 'online' : 'offline';
        if (j.online) d.info = j;
    } catch { d.status = 'offline'; }

    if (d.status !== 'online') { d.servers = []; d.resources = null; return; }

    const [sv, rs, upd] = await Promise.allSettled([
        proxyGet(inst.id, 'api/servers'),
        proxyGet(inst.id, 'api/resources/summary'),
        proxyGet(inst.id, 'api/update/check'),
    ]);
    d.servers       = sv.status === 'fulfilled' ? (sv.value?.data  ?? []) : [];
    d.resources     = rs.status === 'fulfilled' ? (rs.value?.data ?? null) : null;
    d.serverLoadErr = sv.status === 'fulfilled' && !sv.value?.ok ? sv.value?.status : null;

    if (upd.status === 'fulfilled' && upd.value?.data?.hasUpdate)
        state.updateData[inst.id] = upd.value.data;
    else
        delete state.updateData[inst.id];
}

async function proxyGet(instanceId, path) {
    try {
        const r = await fetch(`/api/proxy/${instanceId}/${path}`);
        return { ok: r.ok, status: r.status, data: r.ok ? await r.json().catch(() => null) : null };
    } catch {
        return { ok: false, status: 0, data: null };
    }
}

async function proxyPost(instanceId, path, body) {
    const r = await fetch(`/api/proxy/${instanceId}/${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
    });
    return { ok: r.ok, status: r.status, data: await r.json().catch(() => null) };
}

async function proxyDelete(instanceId, path) {
    const r = await fetch(`/api/proxy/${instanceId}/${path}`, { method: 'DELETE' });
    return { ok: r.ok, data: await r.json().catch(() => null) };
}

async function proxyPatch(instanceId, path, body) {
    try {
        const r = await fetch(`/api/proxy/${instanceId}/${path}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        return { ok: r.ok, status: r.status, data: await r.json().catch(() => null) };
    } catch {
        return { ok: false, status: 0, data: null };
    }
}

// ── Topbar stats ───────────────────────────────────────────────────────────
function updateTopbarStats() {
    let totCpu = 0, totRam = 0, count = 0;
    for (const inst of state.instances) {
        const d = state.instData[inst.id];
        if (d?.resources) {
            totCpu += d.resources.totalCpuPercent ?? 0;
            totRam += d.resources.totalRamMb ?? 0;
            count++;
        }
    }
    const cpuPct = count ? Math.min(100, totCpu / count) : 0;
    document.getElementById('tb-cpu-bar').style.width = cpuPct + '%';
    document.getElementById('tb-cpu-val').textContent  = count ? totCpu.toFixed(1) + '%' : '—';
    const ramGb = totRam / 1024;
    document.getElementById('tb-ram-bar').style.width = Math.min(100, ramGb / 32 * 100) + '%';
    document.getElementById('tb-ram-val').textContent  = count ? ramGb.toFixed(1) + ' GB' : '—';

    const anyUpdate = Object.keys(state.updateData).length > 0;
    document.getElementById('tb-update-badge').style.display = anyUpdate ? '' : 'none';

    // Update server badge count in nav
    const totalOnline = state.instances.reduce((n, i) =>
        n + (state.instData[i.id]?.servers?.filter(s => s.status === 'Started').length ?? 0), 0);
    const badge = document.getElementById('nav-servers-badge');
    if (badge) { badge.textContent = totalOnline; badge.style.display = totalOnline ? '' : 'none'; }
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
    const el = document.getElementById('inst-sidebar');
    if (!state.instances.length) { el.innerHTML = ''; return; }

    el.innerHTML = `<div class="sb-section">Instances</div>` +
        state.instances.map(inst => {
            const d      = state.instData[inst.id] ?? {};
            const status = d.status ?? 'unknown';
            const online = d.servers?.filter(s => s.status === 'Started').length ?? 0;
            const total  = d.servers?.length ?? 0;
            const sel    = state.selInst === inst.id ? 'active' : '';
            return `
<div class="inst-item ${sel}" id="isb-${inst.id}">
  <div class="inst-row" onclick="selectInstance('${inst.id}')">
    <span class="inst-dot ${status === 'online' ? 'online' : 'offline'}"></span>
    <span class="inst-name" title="${esc(inst.name)}">${esc(inst.name)}</span>
    <span class="inst-count">${online}/${total}</span>
    <button class="inst-expand" onclick="toggleInstLog(event,'${inst.id}')">▾</button>
  </div>
  <div class="inst-log" id="ilog-${inst.id}">${getInstLogHtml(inst.id)}</div>
</div>`;
        }).join('');
}

function getInstLogHtml(id) {
    const d = state.instData[id];
    if (!d || d.status !== 'online') return '<span style="color:var(--red)">Offline</span>';
    const s = d.servers?.slice(0, 5).map(s =>
        `[${s.status === 'Started' ? '▶' : '■'}] ${esc(s.name)}`).join('\n') ?? '';
    return s || '(no servers)';
}

function toggleInstLog(e, id) {
    e.stopPropagation();
    document.getElementById(`ilog-${id}`)?.classList.toggle('open');
}

function selectInstance(id) {
    state.selInst = state.selInst === id ? null : id;
    renderSidebar();
    renderView();
}

// ── Views ──────────────────────────────────────────────────────────────────
function showView(v) {
    state.view = v;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + v)?.classList.add('active');
    const titles = { dashboard:'Dashboard', servers:'Servers', logs:'Logs',
                     plugins:'Plugins', instances:'Instances', backup:'Backup & Update',
                     templates:'Config Templates', migrate:'Server Migration', changelog:'Changelog', install:'Install Server' };
    document.getElementById('tb-title').textContent = titles[v] ?? v;
    renderView();
}

function renderView() {
    const el = document.getElementById('content');
    switch (state.view) {
        case 'dashboard': el.innerHTML = renderDashboard(); break;
        case 'servers':   el.innerHTML = renderServers();   break;
        case 'logs':      el.innerHTML = renderLogsView();  loadProxyLog(); break;
        case 'plugins':   el.innerHTML = renderPlugins();   loadPlugins().catch(()=>{}); break;
        case 'instances': el.innerHTML = renderInstances(); break;
        case 'backup':    el.innerHTML = renderBackup();    break;
        case 'templates': el.innerHTML = renderTemplates(); loadTemplatesList(); break;
        case 'migrate':   el.innerHTML = renderMigrate();   setTimeout(migUpdateSrcServers, 0); break;
        case 'changelog': el.innerHTML = renderChangelog(); break;
        case 'install':   el.innerHTML = renderInstall();   loadInstallGames(); break;
        default:          el.innerHTML = '';
    }
    bindCardButtons();
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard() {
    const insts = filteredInstances();
    let total = 0, online = 0, offline = 0, cpuSum = 0, cpuCount = 0;
    const cards = [];

    for (const inst of insts) {
        const d = state.instData[inst.id] ?? {};
        total   += d.servers?.length ?? 0;
        online  += d.servers?.filter(s => s.status === 'Started').length ?? 0;
        offline += d.servers?.filter(s => s.status === 'Stopped').length ?? 0;
        if (d.resources?.totalCpuPercent != null) { cpuSum += d.resources.totalCpuPercent; cpuCount++; }
        (d.servers ?? []).forEach(s => cards.push({ inst, server: s, d }));
    }

    const cpuAvg  = cpuCount ? (cpuSum / cpuCount).toFixed(1) : '—';
    const preview = cards.slice(0, 6);

    return `
<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-label">Total Servers</div>
    <div class="stat-value">${total}</div>
    <div class="stat-sub">Installed</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Online</div>
    <div class="stat-value green">${online}</div>
    <div class="stat-sub">Running now</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Offline</div>
    <div class="stat-value red">${offline}</div>
    <div class="stat-sub">Stopped</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Aggregate CPU</div>
    <div class="stat-value accent">${cpuAvg}${cpuCount ? '%' : ''}</div>
    <div class="stat-sub">All instances</div>
  </div>
</div>
<div class="section-row">
  <span class="section-title">Server overview</span>
  <button class="btn-sm" onclick="showView('servers')">View all →</button>
</div>
<div class="server-grid">
  ${preview.length
    ? preview.map(({inst, server, d}) => serverCard(inst, server, d)).join('')
    : '<div class="empty">No servers found. Add a WGSM instance in the Instances page.</div>'}
</div>`;
}

// ── Servers ────────────────────────────────────────────────────────────────
function renderServers() {
    const insts = filteredInstances();
    const cards = [];
    for (const inst of insts)
        (state.instData[inst.id]?.servers ?? []).forEach(s =>
            cards.push({ inst, server: s, d: state.instData[inst.id] }));

    const hints = [];
    for (const inst of insts) {
        const d = state.instData[inst.id];
        if (!d || d.status !== 'online' || d.servers.length) continue;
        const code = d.serverLoadErr;
        if (code === 401)
            hints.push(`<div class="hint hint-orange">⚠ <b>${esc(inst.name)}</b>: token rejected (401) — paste the correct API token in the Instances page.</div>`);
        else if (code === 503)
            hints.push(`<div class="hint hint-orange">⚠ <b>${esc(inst.name)}</b>: Web API not started (503) — click Start Web API inside WGSM.</div>`);
        else if (code === 408 || code === 0)
            hints.push(`<div class="hint hint-orange">⚠ <b>${esc(inst.name)}</b>: connection timed out — set Connection Scope to <b>LAN</b> or <b>External</b> in WGSM › Web API › Connection.</div>`);
        else if (code)
            hints.push(`<div class="hint hint-orange">⚠ <b>${esc(inst.name)}</b>: server list failed (HTTP ${code}).</div>`);
        else if (d.info?.totalServers === 0)
            hints.push(`<div class="hint hint-muted">ℹ <b>${esc(inst.name)}</b>: no servers installed yet.</div>`);
    }

    return `
<div class="section-row">
  <span class="section-title">All servers (${cards.length})</span>
  <button class="btn-sm" onclick="refreshAll()">↻ Refresh</button>
</div>
${hints.join('')}
<div class="server-grid">
  ${cards.length
    ? cards.map(({inst, server, d}) => serverCard(inst, server, d)).join('')
    : hints.length ? '' : '<div class="empty">No servers found.</div>'}
</div>`;
}

// ── Logs view ──────────────────────────────────────────────────────────────
function renderLogsView() {
    const insts = filteredInstances();
    const rows  = [];
    for (const inst of insts)
        (state.instData[inst.id]?.servers ?? []).forEach(s =>
            rows.push(`<div class="inst-card">
  <div class="inst-card-info">
    <div class="inst-card-name">${esc(s.name)}</div>
    <div class="inst-card-url">${esc(inst.name)} · ${esc(s.game)}</div>
  </div>
  <span class="badge ${statusClass(s.status)}">${esc(s.status)}</span>
  <button class="btn-sm" onclick="openLogModal('${inst.id}','${s.id}','${esc(s.name)}')">View logs</button>
</div>`));
    return `
<div class="section-row"><span class="section-title">Server logs</span></div>
${rows.length ? rows.join('') : '<div class="empty">No servers found.</div>'}
<div class="section-row" style="margin-top:20px">
  <span class="section-title">Dashboard proxy log</span>
  <button class="btn-sm" onclick="loadProxyLog()">↻ Refresh</button>
</div>
<div id="proxy-log-panel" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:Consolas,monospace;font-size:11px;line-height:1.6;max-height:340px;overflow-y:auto;color:var(--muted)">
  Loading…
</div>`;
}

async function loadProxyLog() {
    const el = document.getElementById('proxy-log-panel');
    if (!el) return;
    try {
        const r = await fetch('/api/logs');
        const entries = await r.json();
        if (!entries.length) { el.textContent = 'No requests logged yet.'; return; }
        el.innerHTML = entries.map(e => {
            const col = e.type === 'error' ? 'var(--red)'
                      : e.status >= 400   ? 'var(--orange)'
                                          : 'var(--text)';
            const detail = e.type === 'proxy'
                ? `<span style="color:${col}">${e.method} ${e.url} → ${e.status} (${e.ms}ms)</span>`
                : e.type === 'error'
                ? `<span style="color:var(--red)">${e.method} ${e.url} ✗ ${esc(e.error)} (${e.ms}ms)</span>`
                : `<span style="color:#555">${e.method} ${esc(e.path)}</span>`;
            return `<div>${e.ts.slice(11,19)} ${detail}</div>`;
        }).join('');
    } catch (err) {
        el.textContent = 'Failed to load log: ' + err.message;
    }
}

// ── Instances ──────────────────────────────────────────────────────────────
function renderInstances() {
    const cards = state.instances.map(inst => {
        const d      = state.instData[inst.id] ?? {};
        const status = d.status ?? 'unknown';
        const dotCls = status === 'online' ? 'dot-green' : status === 'offline' ? 'dot-red' : 'dot-grey';
        const info   = d.info ? ` · ${d.info.instanceName} · ${d.info.onlineServers}/${d.info.totalServers} online` : '';
        const upd    = state.updateData[inst.id];
        const updBadge = upd ? `<span class="badge started" style="font-size:10px;margin-left:6px">⬆ ${esc(upd.latestTag)}</span>` : '';
        return `<div class="inst-card">
  <span class="status-dot ${dotCls}" style="flex-shrink:0"></span>
  <div class="inst-card-info">
    <div class="inst-card-name">${esc(inst.name)}${updBadge}</div>
    <div class="inst-card-url">${esc(inst.url)}</div>
    <div class="inst-card-status" style="color:${status === 'online' ? 'var(--green)' : status === 'offline' ? 'var(--red)' : 'var(--muted)'}">${status}${info}</div>
  </div>
  <button class="btn-sm" onclick="pingInstance('${inst.id}')">Ping</button>
  <button class="btn-danger" onclick="removeInstance('${inst.id}')">Remove</button>
</div>`;
    }).join('');

    return `
<div class="section-row"><span class="section-title">WGSM instances (${state.instances.length})</span></div>
${cards || '<div class="empty" style="padding:20px 0">No instances added yet.</div>'}
<div class="add-form">
  <div class="add-form-title">Add instance</div>
  <div class="form-grid">
    <div class="form-field"><label>Name</label><input id="af-name" placeholder="Gaming Rig #1"/></div>
    <div class="form-field"><label>URL (with port)</label><input id="af-url" placeholder="http://192.168.1.100:7876"/></div>
    <div class="form-field form-full"><label>API Token</label><input id="af-token" placeholder="Paste token from WGSM › Web API › API Keys"/></div>
  </div>
  <div style="margin-top:14px">
    <button class="btn-primary" onclick="addInstance()">Add instance</button>
  </div>
</div>`;
}

// ── Backup & Update ────────────────────────────────────────────────────────
function renderBackup() {
    const insts = filteredInstances().filter(i => state.instData[i.id]?.status === 'online');
    if (!insts.length)
        return `<div class="section-row"><span class="section-title">Backup &amp; Update</span></div>
<div class="empty">No online instances.</div>`;

    const sections = insts.map(inst => {
        const upd = state.updateData[inst.id];
        const updHtml = upd
            ? `<span style="color:var(--orange);font-size:11px">⬆ Update available: ${esc(upd.latestTag)}</span>`
            : `<span style="color:var(--green);font-size:11px">✓ Up to date</span>`;

        return `<div class="backup-inst-section">
  <div class="backup-inst-header">
    <div>
      <div class="backup-inst-name">${esc(inst.name)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">${updHtml}</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      ${upd?.downloadUrl ? `<button class="btn-sm" style="color:var(--orange);border-color:var(--orange-bg)" onclick="applyUpdate('${inst.id}','${esc(upd.downloadUrl)}')">⬆ Apply update</button>` : ''}
      <button class="btn-sm" onclick="createBackup('${inst.id}',this)">⊟ Create backup</button>
    </div>
  </div>
  <div class="backup-list" id="bklist-${inst.id}">Loading…</div>
</div>`;
    }).join('');

    setTimeout(() => insts.forEach(i => loadBackupList(i.id)), 50);
    return `<div class="section-row"><span class="section-title">Backup &amp; Update</span></div>${sections}`;
}

async function loadBackupList(instanceId) {
    const el = document.getElementById(`bklist-${instanceId}`);
    if (!el) return;
    const { data } = await proxyGet(instanceId, 'api/backup/list');
    if (!Array.isArray(data) || !data.length) { el.textContent = '(no local backups)'; return; }
    el.innerHTML = data.slice(0, 10).map(f =>
        `<div class="backup-item">${esc(f.name)} <span style="color:var(--muted)">${(f.size/1024/1024).toFixed(1)} MB</span></div>`
    ).join('');
}

async function createBackup(instanceId, btn) {
    btn.disabled = true; btn.textContent = 'Creating…';
    const r = await proxyPost(instanceId, 'api/backup/create');
    btn.textContent = r.ok ? '✓ Done' : '✗ Failed';
    setTimeout(() => { btn.textContent = '⊟ Create backup'; btn.disabled = false; }, 3000);
    if (r.ok) loadBackupList(instanceId);
}

async function applyUpdate(instanceId, downloadUrl) {
    if (!confirm('This will stop all servers and restart WGSM. Continue?')) return;
    const r = await proxyPost(instanceId, 'api/update/apply', { downloadUrl });
    alert(r.data?.message ?? (r.ok ? 'Update started.' : 'Failed.'));
}

// ── Plugins ────────────────────────────────────────────────────────────────
const pluginState = { installed: [], available: [], byFileName: {}, instanceId: null, query: '' };

function renderPlugins() {
    const inst = filteredInstances().find(i => state.instData[i.id]?.status === 'online');
    pluginState.instanceId = inst?.id ?? null;
    return `
<div class="section-row">

async function loadPlugins() {
    const iid = pluginState.instanceId;

    // Available list comes from the inline registry — always 87 plugins,
    // no network call, no server restart needed.
    pluginState.available = PLUGIN_REGISTRY;
    pluginState.byFileName = {};
    PLUGIN_REGISTRY.forEach(p => { pluginState.byFileName[p.fileName] = p; });

    // Installed list comes from WGSM (only if an instance is online)
    if (iid) {
        const instRes = await proxyGet(iid, 'api/plugins/installed');
        pluginState.installed = instRes.data ?? [];
    } else {
        pluginState.installed = [];
    }

    renderInstalledPlugins();
    filterPlugins();
}

function renderInstalledPlugins() {
    const el = document.getElementById('plugin-installed-list');
    if (!el) return;
    if (!pluginState.installed.length) {
        el.innerHTML = '<div class="empty" style="color:var(--muted);padding:12px 0">No plugins installed.</div>';
        return;
    }
    el.innerHTML = pluginState.installed.map(p => `
<div class="plugin-card">
  <div class="plugin-info">
    <div class="plugin-name">${esc(p.folder)}</div>
    <div class="plugin-desc" style="color:${p.hasFile ? 'var(--green)' : 'var(--red)'}">
      ${p.hasFile ? '● loaded' : '● missing .cs file'}
    </div>
  </div>
  <button class="btn-danger" onclick="uninstallPlugin('${esc(p.folder)}',this)">Remove</button>
</div>`).join('');
}

function filterPlugins() {
    const q  = (document.getElementById('plugin-search')?.value ?? '').trim().toLowerCase();
    pluginState.query = q;
    const el = document.getElementById('plugin-available-list');
    if (!el) return;

    const installedSet = new Set(pluginState.installed.map(p => p.folder.toLowerCase()));
    const list = q
        ? pluginState.available.filter(p =>
            p.pluginName.toLowerCase().includes(q) ||
            (p.description || '').toLowerCase().includes(q) ||
            p.owner.toLowerCase().includes(q))
        : pluginState.available;

    if (!list.length) {
        el.innerHTML = '<div class="empty" style="padding:12px 0">No plugins match your search.</div>';
        return;
    }

    el.innerHTML = list.map(p => {
        const isInst = installedSet.has(p.fileName.toLowerCase());
        return `
<div class="plugin-card" id="plugcard-${esc(p.fileName)}">
  <div class="plugin-info">
    <div class="plugin-name">${esc(p.pluginName)}</div>
    <div class="plugin-desc">${esc(p.description ?? p.repo)}</div>
    <div class="plugin-repo">${esc(p.owner)}/${esc(p.repo)}</div>
  </div>
  ${isInst
    ? '<span style="color:var(--green);font-size:12px;white-space:nowrap">✓ installed</span>'
    : `<button class="btn-primary" style="font-size:11px;padding:5px 12px;white-space:nowrap" onclick="installPlugin('${esc(p.fileName)}',this)">Install</button>`
  }
</div>`;
    }).join('');
}

async function installPlugin(fileName, btn) {
    const p = pluginState.byFileName?.[fileName];
    if (!p) { alert('Plugin data not found. Refresh the plugin list first.'); return; }
    btn.disabled = true; btn.textContent = 'Installing…';
    const rawUrl = `https://raw.githubusercontent.com/${p.owner}/${p.repo}/${p.branch}/${p.filePath}`;
    try {
        const res  = await fetch('/api/install-plugin', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ instanceId: pluginState.instanceId, rawUrl, fileName: p.fileName })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok !== false) {
            btn.textContent = '✓ Installed';
            btn.style.cssText = 'background:var(--green-bg);color:var(--green);font-size:11px;padding:5px 12px;border:none;border-radius:6px;cursor:default';
            const instRes = await proxyGet(pluginState.instanceId, 'api/plugins/installed');
            pluginState.installed = instRes.data ?? [];
            renderInstalledPlugins();
        } else {
            btn.textContent = '✗ Failed'; btn.disabled = false;
            alert('Install failed: ' + (data.error ?? data.message ?? `HTTP ${res.status}`));
        }
    } catch (e) {
        btn.textContent = '✗ Failed'; btn.disabled = false;
        alert('Install error: ' + e.message);
    }
}

async function installFromUrl() {
    const input  = document.getElementById('plugin-url-input');
    const status = document.getElementById('url-install-status');
    const btn    = document.getElementById('url-install-btn');
    const url    = input?.value?.trim();
    if (!url) { setStatus(status, 'Paste a URL first.', false); return; }
    if (!pluginState.instanceId) { setStatus(status, '⚠ No online instance selected.', false); return; }

    btn.disabled = true;
    setStatus(status, 'Resolving…', null);

    let rawUrl, fileName;
    try {
        if (url.startsWith('https://raw.githubusercontent.com/')) {
            // Direct raw URL — use as-is, filename is the last path segment
            rawUrl   = url;
            fileName = url.split('?')[0].split('/').pop();
        } else if (url.includes('github.com/')) {
            const clean = url.replace(/^https?:\/\/github\.com\//, '').replace(/\.git$/, '').replace(/\/$/, '');
            const parts = clean.split('/');
            const owner = parts[0], repo = parts[1];
            // Check registry first
            const entry = PLUGIN_REGISTRY.find(p =>
                p.owner.toLowerCase() === owner?.toLowerCase() &&
                p.repo.toLowerCase()  === repo?.toLowerCase());
            if (entry) {
                rawUrl   = `https://raw.githubusercontent.com/${entry.owner}/${entry.repo}/${entry.branch}/${entry.filePath}`;
                fileName = entry.fileName;
            } else if (parts[2] === 'blob' && parts.length >= 5) {
                // github.com/Owner/Repo/blob/branch/path/File.cs
                fileName = parts[parts.length - 1];
                rawUrl   = `https://raw.githubusercontent.com/${parts[0]}/${parts[1]}/${parts[3]}/${parts.slice(4).join('/')}`;
            } else {
                setStatus(status, '✗ Repo not in registry. Paste a direct raw URL instead.', false);
                btn.disabled = false; return;
            }
        } else {
            setStatus(status, '✗ Paste a github.com or raw.githubusercontent.com URL.', false);
            btn.disabled = false; return;
        }

        if (!fileName?.toLowerCase().endsWith('.cs')) {
            setStatus(status, `✗ '${fileName}' is not a .cs file.`, false);
            btn.disabled = false; return;
        }

        setStatus(status, `Installing ${fileName}…`, null);
        const res  = await fetch('/api/install-plugin', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ instanceId: pluginState.instanceId, rawUrl, fileName })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok !== false) {
            setStatus(status, '✓ ' + (data.message ?? `${fileName} installed!`), true);
            if (input) input.value = '';
            const instRes = await proxyGet(pluginState.instanceId, 'api/plugins/installed');
            pluginState.installed = instRes.data ?? [];
            renderInstalledPlugins();
        } else {
            setStatus(status, '✗ ' + (data.error ?? data.message ?? `HTTP ${res.status}`), false);
        }
    } catch (e) {
        setStatus(status, '✗ ' + e.message, false);
    }
    btn.disabled = false;
}

function setStatus(el, msg, ok) {
    if (!el) return;
    el.textContent = msg;
    el.style.color = ok === true ? 'var(--green)' : ok === false ? 'var(--red)' : 'var(--muted)';
}

async function uninstallPlugin(fileName, btn) {
    if (!confirm(`Remove plugin ${fileName}? WGSM must be restarted to unload it.`)) return;
    btn.disabled = true;
    const r = await proxyDelete(pluginState.instanceId, `api/plugins/${encodeURIComponent(fileName)}`);
    if (r.ok) {
        const { data: installed } = await proxyGet(pluginState.instanceId, 'api/plugins/installed');
        pluginState.installed = installed ?? [];
        renderInstalledPlugins();
    } else {
        btn.disabled = false;
        alert('Remove failed: ' + (r.data?.error ?? 'unknown error'));
    }
}

// ── Server card ────────────────────────────────────────────────────────────
function serverCard(inst, s, d) {
    const running  = s.status === 'Started';
    const starting = ['Starting','Restarting'].includes(s.status);
    const stopping = s.status === 'Stopping';
    const stopped  = s.status === 'Stopped';
    const busy     = starting || stopping;

    const totalRam = d.resources?.totalRamMb ?? 0;
    const cpuPct   = s.cpuPercent != null ? s.cpuPercent.toFixed(1) : null;
    const cpuBar   = cpuPct != null ? Math.min(100, parseFloat(cpuPct)) : 0;
    const ramMb    = s.ramMb != null ? s.ramMb.toFixed(0) : null;
    const ramBar   = (ramMb && totalRam) ? Math.min(100, (parseFloat(ramMb) / totalRam) * 100) : 0;

    const dotCls = running ? 'dot-green' : stopping || starting ? 'dot-orange' : 'dot-red';

    const players = s.playersCurrent != null
        ? `<span class="meta-chip">👥 ${s.playersCurrent}/${s.playersMax ?? '?'}</span>` : '';

    function portChip(label, portNum, reachable) {
        if (!portNum) return '';
        const cls = reachable == null ? 'unknown' : reachable ? 'ok' : 'fail';
        return `<span class="port-chip"><span class="port-dot ${cls}"></span>${label ? label + ':' : ''}${esc(portNum)}</span>`;
    }
    const port      = portChip('', s.serverPort, s.gamePortReachable);
    const queryPort = (s.queryPort && s.queryPort !== s.serverPort)
        ? portChip('Q', s.queryPort, s.queryPortReachable) : '';
    const multiInst = state.instances.length > 1
        ? `<div class="card-inst">${esc(inst.name)}</div>` : '';

    return `<div class="server-card" id="card-${inst.id}-${s.id}">
  <div class="card-header">
    <span class="status-dot ${dotCls}"></span>
    <div style="flex:1;overflow:hidden">
      <div class="card-name">${esc(s.name)}</div>
      ${multiInst}
    </div>
    <span class="badge ${statusClass(s.status)}">${esc(s.status)}</span>
  </div>
  <div class="card-game">${esc(s.game)}</div>
  ${running ? `<div class="res-grid">
    <div>
      <div class="res-label">CPU</div>
      <div class="res-value">${cpuPct != null ? cpuPct + '%' : '—'}</div>
      <div class="res-bar"><div class="res-bar-fill cpu" style="width:${cpuBar}%"></div></div>
    </div>
    <div>
      <div class="res-label">RAM</div>
      <div class="res-value">${ramMb != null ? fmtMb(parseFloat(ramMb)) : '—'}</div>
      <div class="res-bar"><div class="res-bar-fill ram" style="width:${ramBar}%"></div></div>
    </div>
  </div>` : ''}
  <div class="card-meta">${port}${queryPort}${players}</div>
  <div class="card-actions">
    <button class="btn-action btn-start"   data-inst="${inst.id}" data-id="${s.id}" data-cmd="start"
      ${running||starting ? 'disabled' : ''}>▶ Start</button>
    <button class="btn-action btn-restart" data-inst="${inst.id}" data-id="${s.id}" data-cmd="restart"
      ${stopped||busy ? 'disabled' : ''}>↺ Restart</button>
    <button class="btn-action btn-stop"    data-inst="${inst.id}" data-id="${s.id}" data-cmd="stop"
      ${stopped||stopping ? 'disabled' : ''}>■ Stop</button>
    <button class="btn-action btn-logs"    onclick="openLogModal('${inst.id}','${s.id}','${esc(s.name)}')">≡ Logs</button>
    <button class="btn-action" style="color:var(--accent)"       onclick="openServerConfig('${inst.id}','${s.id}','${esc(s.name)}')">⚙ Config</button>
    <button class="btn-action" style="color:var(--muted)"        onclick="openFileEditor('${inst.id}','${s.id}','${esc(s.name)}')">📁 Files</button>
  </div>
  <div class="card-fb" id="fb-${inst.id}-${s.id}"></div>
</div>`;
}

function bindCardButtons() {
    document.querySelectorAll('[data-cmd]').forEach(btn => {
        btn.addEventListener('click', async () => {
            const { inst, id, cmd } = btn.dataset;
            await serverAction(inst, id, cmd);
        });
    });
}

async function serverAction(instanceId, serverId, cmd) {
    const fb   = document.getElementById(`fb-${instanceId}-${serverId}`);
    const card = document.getElementById(`card-${instanceId}-${serverId}`);
    card?.querySelectorAll('[data-cmd]').forEach(b => b.disabled = true);
    if (fb) fb.textContent = `Sending ${cmd}…`;
    const { ok, data } = await proxyPost(instanceId, `api/servers/${serverId}/${cmd}`);
    if (fb) fb.textContent = data?.message ?? (ok ? 'Done.' : 'Failed.');
    setTimeout(async () => {
        await fetchInstance(state.instances.find(i => i.id === instanceId));
        renderView();
    }, 1500);
}

// ── Log modal ──────────────────────────────────────────────────────────────
function openLogModal(instanceId, serverId, serverName) {
    state.logCtx = { instanceId, serverId, serverName };
    document.getElementById('log-modal-title').textContent = `Logs — ${serverName}`;
    document.getElementById('log-modal').classList.add('open');
    loadLogs();
}
function closeLogModal(e) {
    if (e && e.target !== document.getElementById('log-modal')) return;
    document.getElementById('log-modal').classList.remove('open');
    state.logCtx = null;
}
async function loadLogs() {
    if (!state.logCtx) return;
    const { instanceId, serverId } = state.logCtx;
    const body = document.getElementById('log-modal-body');
    body.textContent = 'Loading…';
    const { data } = await proxyGet(instanceId, `api/servers/${serverId}/logs?count=500`);
    body.textContent = Array.isArray(data) && data.length ? data.join('\n') : '(no log output available)';
    scrollLogToBottom();
}
function refreshLogModal() { loadLogs(); }
function scrollLogToBottom() {
    const b = document.getElementById('log-modal-body');
    b.scrollTop = b.scrollHeight;
}

<div class="cfg-field"><label>Launch Parameters</label><input id="cfg-serverParam" value="${esc(co.serverParam??'')}"/></div>
<div class="cfg-field"><label>GSLT Token</label><input id="cfg-serverGslt" value="${esc(co.serverGslt??'')}"/></div>

  ${cfgCheck('updateOnStart','Update on Start',co.updateOnStart)}

function cfgCheck(id, label, checked) {

      <input type="checkbox" id="cfg-${id}" ${checked?'checked':''}> ${label}</label>`;
}

async function saveServerConfig() {
    if (!cfgState) return;
    const b = {
        serverName:   document.getElementById('cfg-serverName')?.value,
        serverIp:     document.getElementById('cfg-serverIp')?.value,
        serverPort:   document.getElementById('cfg-serverPort')?.value,
        queryPort:    document.getElementById('cfg-queryPort')?.value,
        maxPlayers:   document.getElementById('cfg-maxPlayers')?.value,
        serverMap:    document.getElementById('cfg-serverMap')?.value,
        serverParam:  document.getElementById('cfg-serverParam')?.value,
        serverGslt:   document.getElementById('cfg-serverGslt')?.value,
        cpuPriority:  document.getElementById('cfg-cpuPriority')?.value,
        autoRestart:  document.getElementById('cfg-autoRestart')?.checked,
        autoStart:    document.getElementById('cfg-autoStart')?.checked,
        autoUpdate:   document.getElementById('cfg-autoUpdate')?.checked,
        updateOnStart:document.getElementById('cfg-updateOnStart')?.checked,
        backupOnStart:document.getElementById('cfg-backupOnStart')?.checked,
        discordAlert: document.getElementById('cfg-discordAlert')?.checked,
        discordWebhook:document.getElementById('cfg-discordWebhook')?.value,
    };
    const { ok, data } = await proxyPatch(cfgState.instanceId, `api/servers/${cfgState.serverId}/config`, b);
    const msg = document.getElementById('cfg-save-msg');
    if (msg) { msg.style.color = ok ? 'var(--green)' : 'var(--red)'; msg.textContent = ok ? '✓ Saved' : ('✗ ' + (data?.message ?? 'Save failed')); }

async function saveConfigAsTemplate() {
    if (!cfgState) return;
    const name = prompt('Template name:');
    if (!name) return;
    let game = '';
    for (const inst of state.instances) {
        const sv = state.instData[inst.id]?.servers?.find(s => s.id === cfgState.serverId);
        if (sv) { game = sv.game; break; }
    }
    const config = {
        serverName:   document.getElementById('cfg-serverName')?.value ?? '',
        serverIp:     document.getElementById('cfg-serverIp')?.value ?? '',
        serverPort:   document.getElementById('cfg-serverPort')?.value ?? '',
        queryPort:    document.getElementById('cfg-queryPort')?.value ?? '',
        maxPlayers:   document.getElementById('cfg-maxPlayers')?.value ?? '',
        serverMap:    document.getElementById('cfg-serverMap')?.value ?? '',
        serverParam:  document.getElementById('cfg-serverParam')?.value ?? '',
        serverGslt:   document.getElementById('cfg-serverGslt')?.value ?? '',
        cpuPriority:  document.getElementById('cfg-cpuPriority')?.value ?? '',
    };
    const r = await fetch('/api/templates', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,game,config}) });
    alert(r.ok ? `Template "${name}" saved.` : 'Failed to save template.');
}

// ── File editor modal ──────────────────────────────────────────────────────
let fileState = null;

function closeFileModal(e) {
    if (e && e.target !== document.getElementById('file-modal')) return;
    document.getElementById('file-modal').classList.remove('open');
    fileState = null;
}

async function openFileEditor(instanceId, serverId, serverName) {
    fileState = { instanceId, serverId, serverName, path: '', currentFile: null };
    document.getElementById('file-modal-title').textContent = `Files — ${serverName}`;
    document.getElementById('file-modal').classList.add('open');
    await browseFiles('');
}

async function browseFiles(dirPath) {
    if (!fileState) return;
    fileState.path = dirPath;
    document.getElementById('file-breadcrumb').textContent = '/' + dirPath;
    const tree = document.getElementById('file-tree');
    tree.innerHTML = '<div class="empty" style="padding:20px 10px;font-size:11px">Loading…</div>';
    document.getElementById('file-save-btn').style.display = 'none';
    document.getElementById('file-download-btn').style.display = 'none';
    document.getElementById('file-editor').value = '';
    document.getElementById('file-status').textContent = '';
    fileState.currentFile = null;

    const qs = dirPath ? `?path=${encodeURIComponent(dirPath)}` : '';
    const { data, ok } = await proxyGet(fileState.instanceId, `api/servers/${fileState.serverId}/files${qs}`);
    if (!ok || !data?.entries) {
        tree.innerHTML = '<div class="empty" style="padding:20px 10px;font-size:11px;color:var(--red)">Failed to load directory.</div>';
        return;
    }

    if (!data.entries.length) {
        tree.innerHTML = '<div class="empty" style="padding:20px 10px;font-size:11px">Empty directory.</div>';
        return;
    }

    tree.innerHTML = data.entries.map(e => {
        const icon = e.isDir ? '📁' : fileIcon(e.name);
        const size = (!e.isDir && e.size) ? ` <span style="color:var(--muted);font-size:10px">${fmtBytes(e.size)}</span>` : '';
        return `<div class="file-entry" onclick="fileEntryClick(${JSON.stringify(e.path)},${e.isDir})">
  <span class="file-entry-icon">${icon}</span>
  <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${esc(e.name)}</span>${size}
</div>`;
    }).join('');
}

function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = { cfg:'⚙',ini:'⚙',json:'{}',yaml:'{}',yml:'{}',txt:'📄',conf:'⚙',xml:'<>',toml:'⚙',sh:'$',bat:'$',cmd:'$',log:'≡',lua:'🌙',properties:'⚙' };
    return map[ext] ?? '📄';
}

function fmtBytes(b) {
    if (b < 1024) return b + 'B';
    if (b < 1048576) return (b/1024).toFixed(1) + 'KB';
    return (b/1048576).toFixed(1) + 'MB';
}

async function fileEntryClick(path, isDir) {
    if (isDir) { await browseFiles(path); return; }
    await openFile(path);
}

async function openFile(path) {
    if (!fileState) return;
    fileState.currentFile = path;
    document.getElementById('file-breadcrumb').textContent = '/' + path;
    document.getElementById('file-status').textContent = 'Loading…';
    document.getElementById('file-editor').value = '';
    document.querySelectorAll('.file-entry').forEach(el => el.classList.remove('selected'));

    const { data, ok, status } = await proxyGet(fileState.instanceId, `api/servers/${fileState.serverId}/files/read?path=${encodeURIComponent(path)}`);
    if (!ok) {
        const msg = status === 400 ? 'Binary or oversized file — download only.' : 'Failed to read file.';
        document.getElementById('file-status').textContent = msg;
        document.getElementById('file-save-btn').style.display = 'none';
        document.getElementById('file-download-btn').style.display = '';
        return;
    }
    document.getElementById('file-editor').value = data?.content ?? '';
    document.getElementById('file-status').textContent = `${fmtBytes(data?.sizeByes ?? 0)}  ·  modified ${data?.modified ? new Date(data.modified).toLocaleString() : 'unknown'}`;
    document.getElementById('file-save-btn').style.display = '';
    document.getElementById('file-download-btn').style.display = '';
}

async function saveCurrentFile() {
    if (!fileState?.currentFile) return;
    const content = document.getElementById('file-editor').value;
    const st = document.getElementById('file-status');
    st.textContent = 'Saving…';
    const { ok, data } = await proxyFetch(fileState.instanceId, 'PUT',
        `api/servers/${fileState.serverId}/files/write`,
        { path: fileState.currentFile, content }
    );
    st.style.color = ok ? 'var(--green)' : 'var(--red)';
    st.textContent = ok ? '✓ Saved' : ('✗ ' + (data?.error ?? 'Save failed'));
    setTimeout(() => { if (st) st.style.color = ''; }, 2000);
}

function downloadCurrentFile() {
    if (!fileState?.currentFile) return;
    const inst = state.instances.find(i => i.id === fileState.instanceId);
    if (!inst) return;
    const url = `/api/proxy/${fileState.instanceId}/api/servers/${fileState.serverId}/files/download?path=${encodeURIComponent(fileState.currentFile)}`;
    const a = document.createElement('a');
    a.href = url; a.download = fileState.currentFile.split('/').pop();
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function navigateFileUp() {
    if (!fileState) return;
    const parts = fileState.path.split('/').filter(Boolean);
    parts.pop();
    browseFiles(parts.join('/'));
}

async function proxyFetch(instanceId, method, path, body) {
    try {
        const r = await fetch(`/api/proxy/${instanceId}/${path}`, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: body ? JSON.stringify(body) : undefined,
        });
        return { ok: r.ok, status: r.status, data: await r.json().catch(() => null) };
    } catch { return { ok: false, status: 0, data: null }; }
}

// ── Config Templates view ──────────────────────────────────────────────────
let templatesList = [];

async function loadTemplatesList() {
    try {
        const r = await fetch('/api/templates');
        templatesList = await r.json();
    } catch { templatesList = []; }
    if (state.view === 'templates') document.getElementById('content').innerHTML = renderTemplates();
}

function renderTemplates() {
    const cards = templatesList.map(t => {
        const cfg = t.config ?? {};
        const meta = [t.game && `Game: ${t.game}`, cfg.maxPlayers && `Max: ${cfg.maxPlayers} players`,
                       cfg.serverPort && `Port: ${cfg.serverPort}`].filter(Boolean).join(' · ');
        return `<div class="tpl-card">
  <div class="tpl-info">
    <div class="tpl-name">${esc(t.name)}</div>
    <div class="tpl-meta">${esc(meta || 'No details')}</div>
    <div class="tpl-meta" style="color:#333;margin-top:2px">${new Date(t.createdAt).toLocaleDateString()}</div>
  </div>
  <div class="tpl-actions">
    <button class="btn-sm" onclick="applyTemplate('${t.id}')">Apply</button>
    <button class="btn-danger" onclick="deleteTemplate('${t.id}')">Delete</button>
  </div>
</div>`;
    }).join('');

    return `
<div class="section-row">
  <span class="section-title">Config Templates (${templatesList.length})</span>
</div>
<div class="hint hint-muted" style="margin-bottom:12px">Save server configs as reusable templates. Use <strong>⚙ Config</strong> on any server card, then click <strong>⊛ Save as Template</strong>.</div>
${cards || '<div class="empty">No templates saved yet. Open a server config and click Save as Template.</div>'}`;
}

async function applyTemplate(tplId) {
    const tpl = templatesList.find(t => t.id === tplId);
    if (!tpl) return;
    const onlineInsts = state.instances.filter(i => state.instData[i.id]?.status === 'online');
    if (!onlineInsts.length) { alert('No online instances.'); return; }

    // Build server list
    const servers = [];
    for (const inst of onlineInsts)
        (state.instData[inst.id]?.servers ?? []).forEach(s => servers.push({ inst, s }));
    if (!servers.length) { alert('No servers found.'); return; }

    const opts = servers.map((x,i) => `${i}: ${x.inst.name} › ${x.s.name} (${x.s.game})`).join('\n');
    const idx  = parseInt(prompt(`Select server to apply template "${tpl.name}":\n${opts}\n\nEnter number:`));
    if (isNaN(idx) || !servers[idx]) return;

    const { inst, s } = servers[idx];
    if (!confirm(`Apply template "${tpl.name}" to ${s.name}? This will overwrite its config.`)) return;

    const { ok, data } = await proxyPatch(inst.id, `api/servers/${s.id}/config`, tpl.config);
    alert(ok ? `✓ Template applied to ${s.name}.` : `✗ Failed: ${data?.message ?? 'Error'}`);
}

async function deleteTemplate(tplId) {
    if (!confirm('Delete this template?')) return;
    await fetch(`/api/templates/${tplId}`, { method: 'DELETE' });
    await loadTemplatesList();
}

// ── Server Migration view ──────────────────────────────────────────────────
function renderMigrate() {
    const onlineInsts = state.instances.filter(i => state.instData[i.id]?.status === 'online');
    const instOpts = onlineInsts.map(i => `<option value="${i.id}">${esc(i.name)}</option>`).join('');
    const noInsts = onlineInsts.length < 2;

    return `
<div class="section-row"><span class="section-title">Server Migration</span></div>
<div class="hint hint-muted" style="margin-bottom:16px">
  Clone or move a game server from one WGSM instance to another. The source server must be <strong>stopped</strong> before migrating.
  The process: backup source → download ZIP on this dashboard → upload to destination → restore.
</div>
${noInsts ? '<div class="hint hint-orange">You need at least 2 online instances to migrate between them.</div>' : ''}
<div class="mig-step">
  <div class="mig-step-title">Source</div>
  <div class="mig-row">
    <div class="mig-field"><label>Instance</label>
      <select id="mig-src-inst" onchange="migUpdateSrcServers()">${instOpts}</select>
    </div>
    <div class="mig-field"><label>Server</label>
      <select id="mig-src-server"><option>Loading…</option></select>
    </div>
  </div>
</div>
<div class="mig-step">
  <div class="mig-step-title">Destination</div>
  <div class="mig-row">
    <div class="mig-field"><label>Instance</label>
      <select id="mig-dst-inst">${instOpts}</select>
    </div>
  </div>
</div>
<div class="mig-step">
  <div class="mig-step-title">Action</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn-primary" onclick="runMigration('clone')" ${noInsts?'disabled':''}>Clone (keep source)</button>
    <button class="btn-sm" style="color:var(--orange)" onclick="runMigration('move')" ${noInsts?'disabled':''}>Move (delete source after)</button>
  </div>
  <div class="mig-log" id="mig-log"></div>
</div>`;
}

function migUpdateSrcServers() {
    const instId = document.getElementById('mig-src-inst')?.value;
    if (!instId) return;
    const servers = state.instData[instId]?.servers ?? [];
    const sel = document.getElementById('mig-src-server');
    if (!sel) return;
    sel.innerHTML = servers.map(s => `<option value="${s.id}">${esc(s.name)} (${esc(s.game)}) — ${esc(s.status)}</option>`).join('') || '<option>No servers</option>';
}

async function runMigration(mode) {
    const srcInstanceId = document.getElementById('mig-src-inst')?.value;
    const srcServerId   = document.getElementById('mig-src-server')?.value;
    const dstInstanceId = document.getElementById('mig-dst-inst')?.value;
    if (!srcInstanceId || !srcServerId || !dstInstanceId)
        return alert('Please fill all fields.');
    if (srcInstanceId === dstInstanceId)
        return alert('Source and destination must be different instances.');

    const srcServer = state.instData[srcInstanceId]?.servers?.find(s => s.id === srcServerId);
    if (srcServer?.status !== 'Stopped')
        return alert('The source server must be stopped before migrating.');

    const log = document.getElementById('mig-log');
    log.classList.add('visible');
    log.textContent = `Starting ${mode}…\n`;

    const appendLog = t => { log.textContent += t + '\n'; log.scrollTop = log.scrollHeight; };

    appendLog('Sending migration request to dashboard server…');
    try {
        const r = await fetch('/api/migrate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ srcInstanceId, srcServerId, dstInstanceId, mode }),
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok && data.ok) {
            appendLog('✓ ' + data.message);
            if (data.backupFile) appendLog('Backup: ' + data.backupFile);
        } else {
            appendLog('✗ Migration failed: ' + (data.error ?? `HTTP ${r.status}`));
        }
    } catch (e) {
        appendLog('✗ Error: ' + e.message);
    }
}
