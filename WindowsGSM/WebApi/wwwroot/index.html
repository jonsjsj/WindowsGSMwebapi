<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WindowsGSM · Web API</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--surface:#252525;--surface2:#2e2e2e;--border:#3a3a3a;
  --text:#e0e0e0;--muted:#888;--accent:#0078d4;--accent-h:#1a8ad4;
  --green:#4ec9b0;--red:#f14c4c;--orange:#e8a838;--r:8px;
  --green-bg:#0d2b1a;--red-bg:#2a1a1a;--orange-bg:#2a2200;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;display:flex;flex-direction:column}

/* ── Auth screen ──────────────────────────────────────────────────────── */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--bg)}
#auth-screen h1{font-size:22px;font-weight:600;margin-bottom:4px}
#auth-screen p{color:var(--muted);margin-bottom:32px;font-size:13px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;width:100%;max-width:420px}
.auth-card label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.auth-card input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.auth-card input:focus{border-color:var(--accent)}
.auth-card button{margin-top:16px;width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:10px;font-size:14px;cursor:pointer;font-weight:600;transition:background .15s}
.auth-card button:hover{background:var(--accent-h)}
#auth-error{margin-top:10px;color:var(--red);font-size:12px;min-height:18px}

/* ── App shell ─────────────────────────────────────────────────────────── */
#app{display:none;height:100%;flex-direction:column}
#app.visible{display:flex}

header{background:var(--surface);border-bottom:1px solid var(--border);height:48px;padding:0 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-weight:700;font-size:15px;color:var(--text)}
.logo span{color:var(--accent)}
.header-mid{flex:1;display:flex;align-items:center;gap:16px;padding:0 16px}
.hstat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.hstat-val{color:var(--text);font-weight:600}
.hbar-wrap{width:48px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.hbar-fill{height:100%;border-radius:3px;transition:width .4s}
.hbar-fill.cpu{background:var(--accent)}
.hbar-fill.ram{background:var(--green)}
.header-right{display:flex;align-items:center;gap:8px}
#inst-badge{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--green-bg);color:var(--green);border:1px solid #2a5a2a}
.hbtn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;transition:.15s;font-family:inherit}
.hbtn:hover{border-color:var(--accent);color:var(--text)}
.hbtn.danger:hover{border-color:var(--red);color:var(--red)}

/* ── Layout ────────────────────────────────────────────────────────────── */
#shell{flex:1;display:flex;overflow:hidden}
#sidebar{width:200px;min-width:140px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
@media(max-width:600px){#sidebar{display:none}}
.sb-sect{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:14px 14px 4px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:var(--muted);font-size:12px;transition:background .1s,color .1s;user-select:none;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;font-family:inherit}
.nav-btn:hover{background:var(--surface2);color:#ccc}
.nav-btn.active{background:var(--surface2);color:var(--text);border-left-color:var(--accent)}
#content-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
#view{flex:1;overflow-y:auto;padding:20px}

/* ── Server grid & cards ───────────────────────────────────────────────── */
.server-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.server-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
.server-card:hover{border-color:#555}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-weight:600;font-size:14px}
.card-game{font-size:11px;color:var(--muted);margin-top:2px}
.status-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.s-started {background:var(--green-bg);color:var(--green);border:1px solid #2a5a2a}
.s-stopped {background:var(--red-bg);color:var(--red);border:1px solid #4a2a2a}
.s-starting,.s-restarting{background:var(--orange-bg);color:var(--orange);border:1px solid #4a3010}
.s-stopping{background:var(--orange-bg);color:var(--orange);border:1px solid #4a3010}
.s-unknown {background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.card-res{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px}
.res-label{color:var(--muted);margin-bottom:2px}
.res-val{font-weight:600;font-size:12px}
.res-bar{height:4px;background:var(--surface2);border-radius:2px;margin-top:3px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:2px}
.res-bar-fill.cpu{background:var(--accent)}
.res-bar-fill.ram{background:var(--green)}
.card-meta{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.chip.ok{background:#0d2b1a;color:var(--green);border-color:#2a5a2a}
.chip.fail{background:var(--red-bg);color:var(--red);border-color:#4a2a2a}
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-sm{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 11px;cursor:pointer;font-size:11px;transition:.15s;font-family:inherit;white-space:nowrap}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:12px;font-weight:600;transition:background .15s;font-family:inherit}
.btn-primary:hover{background:var(--accent-h)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #4a2a2a;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:11px;transition:.15s;font-family:inherit}
.btn-danger:hover{filter:brightness(1.2)}
.card-fb{font-size:11px;color:var(--muted);min-height:14px}

/* ── Section / toolbar ─────────────────────────────────────────────────── */
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.empty{text-align:center;padding:60px 24px;color:var(--muted);font-size:13px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Modals ────────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.open{display:flex}
.modal-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);width:min(780px,96vw);max-height:88vh;display:flex;flex-direction:column}
.modal-hdr{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
.modal-close:hover{color:var(--red)}
.modal-body{flex:1;overflow-y:auto;padding:16px}
.modal-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;justify-content:flex-end}
.log-body{flex:1;overflow-y:auto;padding:12px 16px;font-family:'Courier New',monospace;font-size:12px;color:#aaa;line-height:1.5;white-space:pre-wrap;word-break:break-all;background:var(--bg)}

/* ── Config form ───────────────────────────────────────────────────────── */
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:540px){.cfg-grid{grid-template-columns:1fr}}
.cfg-field{margin-bottom:0}
.cfg-field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cfg-field input,.cfg-field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-size:12px;outline:none;transition:border-color .15s;font-family:inherit}
.cfg-field input:focus,.cfg-field textarea:focus{border-color:var(--accent)}
.cfg-full{grid-column:1/-1}
.cfg-checks{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cfg-check{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;padding:4px 0;user-select:none}
#cfg-msg{grid-column:1/-1;font-size:11px;min-height:16px}

/* ── File browser ──────────────────────────────────────────────────────── */
.file-panel{width:min(920px,97vw);height:min(85vh,720px)}
.file-body{flex:1;display:flex;overflow:hidden}
.file-tree{width:220px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.file-entry{display:flex;align-items:center;gap:6px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text);transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-entry:hover{background:var(--surface2)}
.file-entry.active{background:var(--surface2);color:var(--accent)}
.file-editor{flex:1;display:flex;flex-direction:column}
.file-editor textarea{flex:1;width:100%;border:none;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:12px;padding:12px;outline:none;resize:none;line-height:1.6;box-sizing:border-box}
.file-status{padding:4px 12px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);min-height:22px}

/* ── Install wizard ───────────────────────────────────────────────────── */
.install-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:700px){.install-wrap{grid-template-columns:1fr}}
.install-left{display:flex;flex-direction:column;gap:10px}
.install-search{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
.install-search:focus{border-color:var(--accent)}
.install-game-list{max-height:360px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--bg)}
.install-game-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);transition:background .1s}
.install-game-item:last-child{border-bottom:none}
.install-game-item:hover{background:var(--surface2)}
.install-game-item.selected{background:var(--surface2);color:var(--accent);font-weight:600}
.install-right{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:12px}
.install-log{background:var(--bg);border:1px solid var(--border);border-radius:5px;font-family:'Courier New',monospace;font-size:11px;color:#aaa;padding:10px;min-height:120px;max-height:240px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.5}

/* ── Changelog ────────────────────────────────────────────────────────── */
.cl-entry{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:12px}
.cl-version{font-weight:700;font-size:14px;color:var(--accent)}
.cl-date{font-size:11px;color:var(--muted);margin-left:8px}
.cl-title{font-size:13px;font-weight:600;margin:6px 0 8px}
.cl-list{padding-left:18px;margin:0}
.cl-list li{font-size:12px;color:var(--muted);line-height:1.7}
.cl-list li strong{color:var(--text)}
.cl-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;margin-right:4px;font-weight:600}
.cl-tag.new{background:#0d2b1a;color:var(--green)}
.cl-tag.fix{background:#2a1b0d;color:var(--orange)}
.cl-tag.imp{background:#0d1a2b;color:var(--accent)}
</style>
</head>
<body>

<!-- ── Auth ──────────────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <h1>WindowsGSM</h1>
  <p>Web API — Remote Control</p>
  <div class="auth-card">
    <label for="token-input">API Token</label>
    <input type="text" id="token-input" placeholder="Paste token from WGSM › Web API › API Keys" autocomplete="off" spellcheck="false"/>
    <button onclick="connect()">Connect</button>
    <div id="auth-error"></div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="logo">WGSM <span>Web API</span></div>
    <div class="header-mid">
      <div class="hstat">
        CPU
        <div class="hbar-wrap"><div class="hbar-fill cpu" id="h-cpu-bar" style="width:0%"></div></div>
        <span class="hstat-val" id="h-cpu-val">—</span>
      </div>
      <div class="hstat">
        RAM
        <div class="hbar-wrap"><div class="hbar-fill ram" id="h-ram-bar" style="width:0%"></div></div>
        <span class="hstat-val" id="h-ram-val">—</span>
      </div>
      <div class="hstat">
        Disk
        <div class="hbar-wrap"><div class="hbar-fill" id="h-disk-bar" style="width:0%;background:var(--orange)"></div></div>
        <span class="hstat-val" id="h-disk-val">—</span>
      </div>
      <span id="inst-badge">Connecting…</span>
    </div>
    <div class="header-right">
      <button class="hbtn" onclick="loadServers()">↻ Refresh</button>
      <button class="hbtn danger" onclick="logout()">Disconnect</button>
    </div>
  </header>
  <div id="shell">
    <nav id="sidebar">
      <div class="sb-sect">Manage</div>
      <button class="nav-btn active" id="nav-servers" onclick="showView('servers')">▤ Servers</button>
      <button class="nav-btn" id="nav-install" onclick="showView('install')">+ Install Server</button>
      <button class="nav-btn" id="nav-logs"   onclick="showView('logs')">≡ Logs</button>
      <div class="sb-sect">Server</div>
      <button class="nav-btn" id="nav-config" onclick="showView('config')">⚙ Configuration</button>
      <button class="nav-btn" id="nav-files"  onclick="showView('files')">📁 File Manager</button>
      <button class="nav-btn" id="nav-backup" onclick="showView('backup')">⊟ Backup</button>
      <div class="sb-sect">Info</div>
      <button class="nav-btn" id="nav-changelog" onclick="showView('changelog')">✦ Changelog</button>
    </nav>
    <div id="content-area">
      <div id="view"><div class="empty"><div class="spinner"></div>Loading…</div></div>
    </div>
  </div>
</div>

<!-- ── Log modal ──────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="log-modal" onclick="closeModal('log-modal',event)">
  <div class="modal-panel" onclick="event.stopPropagation()" style="height:min(80vh,600px)">
    <div class="modal-hdr">
      <span class="modal-title" id="log-modal-title">Logs</span>
      <button class="modal-close" onclick="closeModal('log-modal')">✕</button>
    </div>
    <div class="log-body" id="log-modal-body"></div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="loadLogs()">↻ Refresh</button>
      <button class="btn-sm" onclick="scrollToBottom('log-modal-body')">↓ Bottom</button>
      <button class="btn-sm" onclick="closeModal('log-modal')">Close</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ── State ──────────────────────────────────────────────────────────────────
let TOKEN       = sessionStorage.getItem('wgsm_token') || '';
let servers     = [];
let resources   = null;
let instInfo    = null;
let currentView = 'servers';
let logCtx      = null;
let fileState   = null;
let refreshTimer = null;

// ── Auth ───────────────────────────────────────────────────────────────────
async function connect() {
    const input = document.getElementById('token-input');
    const err   = document.getElementById('auth-error');
    const token = input.value.trim();
    if (!token) { err.textContent = 'Enter your API token.'; return; }
    err.textContent = '';
    try {
        const r = await apiFetch('/api/servers', token);
        if (r.ok) {
            TOKEN = token;
            sessionStorage.setItem('wgsm_token', token);
            showApp();
        } else {
            err.textContent = r.status === 401 ? 'Invalid token.' : `HTTP ${r.status}`;
        }
    } catch { err.textContent = 'Could not reach the server. Is the Web API running?'; }
}

function logout() {
    TOKEN = ''; sessionStorage.removeItem('wgsm_token');
    clearInterval(refreshTimer);
    document.getElementById('app').classList.remove('visible');
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('token-input').value = '';
    document.getElementById('auth-error').textContent = '';
}

// ── App boot ───────────────────────────────────────────────────────────────
async function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    await Promise.all([loadServers(), loadResources(), loadInfo()]);
    showView('servers');
    refreshTimer = setInterval(async () => {
        await Promise.all([loadServers(), loadResources()]);
        if (currentView === 'servers') renderView();
        updateHeaderStats();
    }, 8000);
}

// ── Data loaders ──────────────────────────────────────────────────────────
async function loadServers() {
    try {
        const r = await apiFetch('/api/servers');
        if (!r.ok) { if (r.status === 401) logout(); return; }
        servers = await r.json();
    } catch {}
}

async function loadResources() {
    try {
        const r = await apiFetch('/api/resources');
        if (r.ok) resources = await r.json();
    } catch {}
    updateHeaderStats();
}

async function loadInfo() {
    try {
        const r = await apiFetch('/api/info');
        if (r.ok) { instInfo = await r.json(); updateInstBadge(); }
    } catch {}
}

function updateHeaderStats() {
    if (!resources) return;
    const cpu      = resources.totalCpuPercent  ?? 0;
    const ram      = resources.totalRamMb       ?? 0;
    const sysRam   = resources.systemTotalRamMb ?? 0;
    const diskUsed = resources.diskUsedGb       ?? 0;
    const diskTotal= resources.diskTotalGb      ?? 0;

    document.getElementById('h-cpu-bar').style.width = Math.min(100, cpu).toFixed(1) + '%';
    document.getElementById('h-cpu-val').textContent  = cpu.toFixed(1) + '%';

    const ramGb = ram >= 1024 ? (ram/1024).toFixed(1)+' GB' : ram.toFixed(0)+' MB';
    document.getElementById('h-ram-val').textContent  = ramGb;
    const ramPct = sysRam > 0 ? Math.min(100, ram / sysRam * 100) : Math.min(100, cpu / 2);
    document.getElementById('h-ram-bar').style.width  = ramPct.toFixed(1) + '%';

    if (diskTotal > 0) {
        const diskPct = Math.min(100, diskUsed / diskTotal * 100);
        document.getElementById('h-disk-bar').style.width = diskPct.toFixed(1) + '%';
        document.getElementById('h-disk-val').textContent = diskUsed.toFixed(1)+'/'+diskTotal.toFixed(0)+' GB';
    }
}

function updateInstBadge() {
    const b = document.getElementById('inst-badge');
    if (!b) return;
    b.textContent = instInfo
        ? `${instInfo.instanceName ?? 'WGSM'} · ${instInfo.onlineServers ?? 0}/${instInfo.totalServers ?? 0} running`
        : 'Connected';
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showView(v) {
    currentView = v;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + v)?.classList.add('active');
    renderView();
}

function renderView() {
    const el = document.getElementById('view');
    switch (currentView) {
        case 'servers':   el.innerHTML = renderServers();           break;
        case 'install':   el.innerHTML = renderInstall();           loadInstallGames(); break;
        case 'logs':      el.innerHTML = renderLogsView();          break;
        case 'config':    el.innerHTML = renderConfigChooser();     break;
        case 'files':     el.innerHTML = renderFilesChooser();      break;
        case 'backup':    el.innerHTML = renderBackupView();        loadBackupData(); break;
        case 'changelog': el.innerHTML = renderChangelog();         break;
        default:          el.innerHTML = '';
    }
}

// ── Servers view ───────────────────────────────────────────────────────────
function renderServers() {
    if (!servers.length)
        return `<div class="section-row"><span class="section-title">Game Servers</span><button class="btn-sm" onclick="loadServers().then(renderView)">↻ Refresh</button></div>
<div class="empty">No servers found. Add a server in the WindowsGSM application first.</div>`;

    const cards = servers.map(s => {
        const running  = s.status === 'Started';
        const stopped  = s.status === 'Stopped';
        const busy     = ['Starting','Stopping','Restarting'].includes(s.status);

        const cpuPct = s.cpuPercent != null ? s.cpuPercent.toFixed(1) : null;
        const ramMb  = s.ramMb     != null ? s.ramMb.toFixed(0)     : null;
        const cpuBar = cpuPct != null ? Math.min(100, parseFloat(cpuPct)) : 0;
        const ramBar = (ramMb && resources?.totalRamMb)
            ? Math.min(100, parseFloat(ramMb) / resources.totalRamMb * 100) : 0;

        const players = s.playersCurrent != null
            ? `<span class="chip ok">👥 ${s.playersCurrent}/${s.playersMax ?? '?'}</span>` : '';

        function portChip(label, port, reach) {
            if (!port) return '';
            const cls = reach == null ? '' : reach ? 'ok' : 'fail';
            return `<span class="chip ${cls}">${label ? label+' ' : ''}${esc(port)}</span>`;
        }

        const stats = running ? `<div class="card-res">
  <div><div class="res-label">CPU</div><div class="res-val">${cpuPct != null ? cpuPct+'%' : '—'}</div><div class="res-bar"><div class="res-bar-fill cpu" style="width:${cpuBar}%"></div></div></div>
  <div><div class="res-label">RAM</div><div class="res-val">${ramMb != null ? fmtMb(parseFloat(ramMb)) : '—'}</div><div class="res-bar"><div class="res-bar-fill ram" style="width:${ramBar}%"></div></div></div>
</div>` : '';

        return `<div class="server-card" id="card-${s.id}">
  <div class="card-top">
    <div><div class="card-name">${esc(s.name)}</div><div class="card-game">${esc(s.game)}</div></div>
    <span class="status-pill s-${(s.status??'unknown').toLowerCase()}">${esc(s.status)}</span>
  </div>
  ${stats}
  <div class="card-meta">
    ${portChip('Port', s.serverPort, s.gamePortReachable)}
    ${portChip('Query', (s.queryPort !== s.serverPort ? s.queryPort : ''), s.queryPortReachable)}
    ${players}
    ${s.map ? `<span class="chip">${esc(s.map)}</span>` : ''}
    ${s.maxPlayers ? `<span class="chip">Max ${esc(s.maxPlayers)}</span>` : ''}
  </div>
  <div class="card-actions">
    <button class="btn-sm" data-id="${s.id}" data-cmd="start"   ${running||busy?'disabled':''}>▶ Start</button>
    <button class="btn-sm" data-id="${s.id}" data-cmd="restart" ${stopped||busy?'disabled':''}>↺ Restart</button>
    <button class="btn-sm" data-id="${s.id}" data-cmd="stop"    ${stopped||busy?'disabled':''}>■ Stop</button>
    <button class="btn-sm" onclick="openLogModal('${s.id}','${esc(s.name)}')">≡ Logs</button>
    <button class="btn-sm" onclick="openInlineConfig('${s.id}','${esc(s.name)}')">⚙ Config</button>
    <button class="btn-sm" onclick="openInlineFiles('${s.id}','${esc(s.name)}')">📁 Files</button>
  </div>
  <div class="card-fb" id="fb-${s.id}"></div>
</div>`;
    }).join('');

    // Bind action buttons after rendering
    setTimeout(bindActionBtns, 0);

    return `<div class="section-row">
  <span class="section-title">Game Servers (${servers.length})</span>
  <button class="btn-sm" onclick="loadServers().then(renderView)">↻ Refresh</button>
</div>
<div class="server-grid">${cards}</div>`;
}

function bindActionBtns() {
    document.querySelectorAll('[data-cmd]').forEach(btn => {
        btn.addEventListener('click', () => serverAction(btn.dataset.id, btn.dataset.cmd));
    });
}

async function serverAction(id, cmd) {
    const card = document.getElementById('card-' + id);
    card?.querySelectorAll('[data-cmd]').forEach(b => b.disabled = true);
    const fb = document.getElementById('fb-' + id);
    if (fb) fb.textContent = 'Sending ' + cmd + '…';
    try {
        const r    = await apiFetch(`/api/servers/${id}/${cmd}`, null, 'POST');
        const data = await r.json().catch(() => ({}));
        if (fb) fb.textContent = data.message ?? (r.ok ? 'Done.' : 'Failed.');
    } catch (e) { if (fb) fb.textContent = 'Error: ' + e.message; }
    setTimeout(async () => { await loadServers(); renderView(); }, 1500);
}

async function loadBackupData() {

        const r = await apiFetch(`/api/servers/${s.id}/backups`);

        const list = await r.json();
        el.innerHTML = list.length
            ? list.slice(0,8).map(f => `<div style="padding:3px 0;border-bottom:1px solid var(--border)">${esc(f.name)} <span style="color:#555">${f.sizeMb} MB · ${new Date(f.created).toLocaleDateString()}</span>

    }

async function triggerBackup(id, btn) {

async function triggerUpdate(id, btn) {

function buildFilePanel() {

    <button class="btn-sm" id="fp-save" onclick="saveInlineFile()" style="display:none">⊟ Save</button>

  </div>
  <div style="flex:1;display:flex;overflow:hidden">
    <div id="fp-tree" style="width:220px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:4px 0">
      <div class="empty" style="padding:16px;font-size:11px">Loading…</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <textarea id="fp-editor" style="flex:1;background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:12px;padding:10px;border:none;outline:none;resize:none;line-height:1.6" placeholder="Select a file to edit…" spellcheck="false"></textarea>
      <div id="fp-status" style="padding:4px 12px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)"></div>
    </div>
  </div>
</div>`;
}

async function browseDir(dirPath) {
    if (!fileState) return;
    fileState.path = dirPath;
    document.getElementById('fpbread').textContent = '/' + dirPath;
    document.getElementById('fp-save').style.display = 'none';
    document.getElementById('fp-dl').style.display   = 'none';
    document.getElementById('fp-editor').value = '';
    document.getElementById('fp-status').textContent = '';
    fileState.currentFile = null;
    const tree = document.getElementById('fp-tree');
    tree.innerHTML = '<div class="empty" style="padding:16px;font-size:11px">Loading…</div>';

    const qs = dirPath ? `?path=${encodeURIComponent(dirPath)}` : '';
    const r  = await apiFetch(`/api/servers/${fileState.id}/files${qs}`);
    if (!r.ok) { tree.innerHTML = '<div class="empty" style="padding:12px;font-size:11px;color:var(--red)">Failed.</div>'; return; }
    const data = await r.json();
    if (!data.entries?.length) { tree.innerHTML = '<div class="empty" style="padding:12px;font-size:11px">Empty.</div>'; return; }
    const root = `/api/servers/${fileState.id}/files`;
    tree.innerHTML = data.entries.map(e =>
        `<div class="file-entry" onclick="${e.isDir ? `browseDir('${e.path}')` : `openFileInPanel('${e.path}')`}">
    <span style="font-size:10px;color:var(--muted)">${e.isDir?'📁':'📄'}</span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${esc(e.name)}</span>
    ${!e.isDir && e.size ? `<span style="font-size:10px;color:var(--muted)">${fmtBytes(e.size)}</span>` : ''}
  </div>`
    ).join('');
}

async function openFileInPanel(path) {
    if (!fileState) return;
    fileState.currentFile = path;
    document.getElementById('fpbread').textContent = '/' + path;
    document.getElementById('fp-status').textContent = 'Loading…';
    document.getElementById('fp-editor').value = '';

    const r = await apiFetch(`/api/servers/${fileState.id}/files/read?path=${encodeURIComponent(path)}`);
    if (!r.ok) {
        document.getElementById('fp-status').textContent = r.status === 400 ? 'Binary file — download only.' : 'Read failed.';
        document.getElementById('fp-save').style.display = 'none';
        document.getElementById('fp-dl').style.display   = '';
        return;
    }
    const data = await r.json();
    document.getElementById('fp-editor').value = data.content ?? '';
    document.getElementById('fp-status').textContent = `${fmtBytes(data.sizeByes??0)} · modified ${data.modified ? new Date(data.modified).toLocaleString() : 'unknown'}`;
    document.getElementById('fp-save').style.display = '';
    document.getElementById('fp-dl').style.display   = '';
}

async function saveInlineFile() {
    if (!fileState?.currentFile) return;
    const content = document.getElementById('fp-editor').value;
    const st = document.getElementById('fp-status');
    st.textContent = 'Saving…';
    const r = await apiFetch(`/api/servers/${fileState.id}/files/write`, null, 'PUT', { path: fileState.currentFile, content });
    const d = await r.json().catch(() => ({}));
    st.style.color = r.ok ? 'var(--green)' : 'var(--red)';
    st.textContent = r.ok ? '✓ Saved' : '✗ ' + (d.error ?? 'Failed');
    setTimeout(() => { if (st) st.style.color = ''; }, 2500);
}

function downloadInlineFile() {
    if (!fileState?.currentFile) return;
    const url = `/api/servers/${fileState.id}/files/download?path=${encodeURIComponent(fileState.currentFile)}`;
    const a = Object.assign(document.createElement('a'), { href: url, download: fileState.currentFile.split('/').pop() });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function navigateUp() {
    if (!fileState) return;
    const parts = fileState.path.split('/').filter(Boolean);
    parts.pop();
    browseDir(parts.join('/'));
}

async function loadInstallGames() {
    try {
        const r = await apiFetch('/api/games');
        if (!r.ok) return;
        const data = await r.json();
        installGames = data.items ?? [];
        filterInstallGames();
    } catch (e) {
        const el = document.getElementById('inst-game-list');
        if (el) el.innerHTML = `<div class="empty" style="padding:24px;color:var(--red)">Failed: ${esc(e.message)}</div>`;
    }
}

function filterInstallGames() {
    const q = (document.getElementById('inst-search')?.value ?? '').toLowerCase();
    const filtered = q ? installGames.filter(g => g.toLowerCase().includes(q)) : installGames;
    const el = document.getElementById('inst-game-list');
    if (!el) return;
    if (!filtered.length) { el.innerHTML = '<div class="empty" style="padding:24px">No games found.</div>'; return; }
    el.innerHTML = filtered.map(g =>
        `<div class="install-game-item${g === installSelectedGame ? ' selected' : ''}" onclick="selectInstallGame(${JSON.stringify(esc(g))})">${esc(g)}</div>`
    ).join('');
}

function selectInstallGame(game) {
    installSelectedGame = game;
    const inp = document.getElementById('inst-game-val');
    if (inp) inp.value = game;
    filterInstallGames();
}

async function startInstall() {
    const game = installSelectedGame;
    if (!game) { setInstStatus('Select a game first.', 'var(--orange)'); return; }

    const name      = document.getElementById('inst-name')?.value.trim() || game;
    const port      = document.getElementById('inst-port')?.value.trim();
    const maxPlayers= document.getElementById('inst-maxplayers')?.value.trim();
    const map       = document.getElementById('inst-map')?.value.trim();
    const ip        = document.getElementById('inst-ip')?.value.trim();
    const params    = document.getElementById('inst-params')?.value.trim();

    const btn = document.getElementById('inst-start-btn');
    if (btn) btn.disabled = true;
    setInstStatus('Starting install…', 'var(--muted)');
    showInstLog('');

    try {
        const r = await apiFetch('/api/servers/install', null, 'POST', { game, serverName: name });
        if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            setInstStatus('Error: ' + (err.message ?? r.statusText), 'var(--red)');
            if (btn) btn.disabled = false;
            return;
        }
        const data = await r.json();
        installJobId = data.jobId;
        const serverId = data.serverId;

        // Poll install progress
        clearInterval(installPollTimer);
        installPollTimer = setInterval(() => pollInstall(serverId, port, maxPlayers, map, ip, params, btn), 2000);
    } catch (e) {
        setInstStatus('Error: ' + e.message, 'var(--red)');
        if (btn) btn.disabled = false;
    }
}

async function pollInstall(serverId, port, maxPlayers, map, ip, params, btn) {
    if (!installJobId) return;
    try {
        const r = await apiFetch('/api/servers/install/' + installJobId);
        if (!r.ok) return;
        const data = await r.json();

        appendInstLog(data.log ?? '');
        if (data.status === 'running') {
            setInstStatus('Installing… (this can take several minutes)', 'var(--muted)');
            return;
        }
        clearInterval(installPollTimer);
        installPollTimer = null;
        installJobId = null;

        if (data.status === 'done') {
            setInstStatus('Install complete! Applying config…', 'var(--green)');
            // Apply user-supplied config if any fields provided
            const cfg = {};
            if (port)       cfg.ServerPort  = port;
            if (maxPlayers) cfg.MaxPlayers  = maxPlayers;
            if (map)        cfg.ServerMap   = map;
            if (ip)         cfg.ServerIp    = ip;
            if (params)     cfg.ServerParam = params;
            if (Object.keys(cfg).length > 0) {
                await apiFetch('/api/servers/' + serverId + '/config', null, 'PATCH', cfg).catch(() => {});
            }
            setInstStatus('Done! Server ' + serverId + ' installed successfully.', 'var(--green)');
            await loadServers();
        } else {
            setInstStatus('Install failed: ' + (data.error ?? 'unknown error'), 'var(--red)');
        }
        if (btn) btn.disabled = false;
    } catch {}
}

let _lastInstLog = '';
function showInstLog(txt) {
    _lastInstLog = '';
    const el = document.getElementById('inst-log');
    if (!el) return;
    el.style.display = 'block';
    el.textContent = txt;
}
function appendInstLog(txt) {
    if (!txt || txt === _lastInstLog) return;
    _lastInstLog = txt;
    const el = document.getElementById('inst-log');
    if (!el) return;
    el.style.display = 'block';
    el.textContent = txt;
    el.scrollTop = el.scrollHeight;
}
function setInstStatus(msg, color) {
    const el = document.getElementById('inst-status');
    if (el) { el.textContent = msg; el.style.color = color ?? 'var(--muted)'; }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function apiFetch(path, token, method='GET', body) {
    return fetch(path, {
        method,
        headers: {
            'Authorization': `Bearer ${token ?? TOKEN}`,
            ...(body ? { 'Content-Type': 'application/json' } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
    });
}

function closeModal(id, e) {
    if (e && e.target !== document.getElementById(id)) return;
    document.getElementById(id).classList.remove('open');
}

function scrollToBottom(id) {
    const el = document.getElementById(id);
    if (el) el.scrollTop = el.scrollHeight;
}

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtMb(mb) { return mb >= 1024 ? (mb/1024).toFixed(1)+' GB' : mb.toFixed(0)+' MB'; }
function fmtBytes(b) { return b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(1)+'KB' : (b/1048576).toFixed(1)+'MB'; }

// ── Boot ───────────────────────────────────────────────────────────────────
document.getElementById('token-input').addEventListener('keydown', e => { if (e.key==='Enter') connect(); });
if (TOKEN) { document.getElementById('token-input').value = TOKEN; connect(); }
