name: Build & Release Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.3). Leave blank to use tag.'
        required: false

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:   'WindowsGSM/WindowsGSM.csproj'
  PUBLISH_DIR:    'publish'
  DIST_DIR:       'dist'

jobs:
  # — Job 1: compile the app once, share as artifact ————————————————————
  build:
    name: Build & publish exe
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $override = '${{ github.event.inputs.version }}'
          $tag      = '${{ github.ref_name }}'
          if ($override -ne '') {
            $ver = $override
          } elseif ($tag -match '^v') {
            $ver = $tag.TrimStart('v')
          } else {
            $ver = '0.0.0-dev'
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $ver"

      - name: Stamp version into AssemblyInfo.cs
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $asmVer = "$ver.0"
          $path = "WindowsGSM/Properties/AssemblyInfo.cs"
          (Get-Content $path) `
            -replace '\[assembly: AssemblyVersion\(".*?"\)\]', "[assembly: AssemblyVersion(`"$asmVer`")]" `
            -replace '\[assembly: AssemblyFileVersion\(".*?"\)\]', "[assembly: AssemblyFileVersion(`"$asmVer`")]" |
            Set-Content $path
          Write-Host "Stamped version $asmVer into $path"

      - name: Build & publish self-contained win-x64
        run: |
          msbuild ${{ env.PROJECT_PATH }} `
            "/t:Restore;Publish" `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            /p:PublishSingleFile=true `
            /p:PublishReadyToRun=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:PublishDir=..\${{ env.PUBLISH_DIR }}\

      - name: Copy wwwroot alongside exe
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.PUBLISH_DIR }}\WebApi\wwwroot"
          Copy-Item -Recurse -Force `
            "WindowsGSM\WebApi\wwwroot\*" `
            "${{ env.PUBLISH_DIR }}\WebApi\wwwroot\"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-output
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error

  # — Job 2: Full installer (WGSM + Web API) ——————————————————————
  release-full:
    name: Full installer & release
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download publish output
        uses: actions/download-artifact@v4
        with:
          name: publish-output
          path: publish

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Compile Full installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          New-Item -ItemType Directory -Force -Path dist
          & $iscc `
            "/DAppVersion=${{ needs.build.outputs.version }}" `
            "/DOutputMode=full" `
            "installer\setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          Write-Host "Built: $(Get-ChildItem dist\*.exe | Select -Expand Name)"

      - name: Upload Full installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-full
          path: dist\WGSM-Full-Setup-*.exe
          if-no-files-found: error

      - name: Create Full GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "WGSM ${{ needs.build.outputs.version }} – Full Install"
          body: |
            ## Full Install – WGSM ${{ needs.build.outputs.version }}

            **Use this if you don't already have WGSM installed.**
            Installs everything: the game server manager and the Web API remote control together.

            ### What's included
            - WGSM (game server manager GUI)
            - Web API – control your servers from any browser
            - Web UI at `http://localhost:7876/ui`
            - Automatic Windows Firewall rule for port 7876
            - Auto-start on Windows login (registry Run key)
            - Desktop & Start Menu shortcuts

            ### Getting started
            1. Run the installer as **Administrator**
            2. Open WGSM
            3. Click **Web API** in the left navigation menu
            4. Click **Generate** to create your API token
            5. Click **Start Web API**
            6. Open `http://localhost:7876/ui` in your browser
            7. Paste your token and click **Connect**

          files: dist\WGSM-Full-Setup-*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
